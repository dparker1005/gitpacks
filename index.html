<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitPacks</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Rajdhani', sans-serif; background: #0a0a1a; color: #e0e0e0; min-height: 100vh; overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 20% 50%, rgba(72,0,255,0.08) 0%, transparent 50%), radial-gradient(ellipse at 80% 20%, rgba(255,0,128,0.06) 0%, transparent 50%), radial-gradient(ellipse at 50% 80%, rgba(0,255,200,0.05) 0%, transparent 50%); z-index: -1; animation: bgPulse 8s ease-in-out infinite alternate; }
    @keyframes bgPulse { 0% { opacity:0.7; } 100% { opacity:1; } }

    /* === SHARED === */
    .btn-primary { padding:14px 32px; border:none; border-radius:12px; background:linear-gradient(135deg,#7873f5,#4adede); color:#fff; font-family:'Orbitron',sans-serif; font-size:0.9rem; font-weight:700; letter-spacing:1px; cursor:pointer; transition:transform 0.2s,box-shadow 0.3s; text-transform:uppercase; }
    .btn-primary:hover { transform:translateY(-2px); box-shadow:0 6px 25px rgba(120,115,245,0.35); }
    .btn-primary:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
    .btn-secondary { padding:18px 48px; border:none; border-radius:14px; background:linear-gradient(135deg,#ff6ec7,#ff9a56); color:#fff; font-family:'Orbitron',sans-serif; font-size:1.1rem; font-weight:700; letter-spacing:2px; cursor:pointer; transition:transform 0.2s,box-shadow 0.3s; text-transform:uppercase; }
    .btn-secondary:hover { transform:translateY(-3px); box-shadow:0 8px 30px rgba(255,110,199,0.4); }
    .btn-secondary:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
    .btn-outline { background:none; border:1px solid #333; color:#666; padding:10px 28px; border-radius:10px; cursor:pointer; font-family:'Orbitron',sans-serif; font-size:0.7rem; letter-spacing:1px; transition:all 0.2s; }
    .btn-outline:hover { border-color:#555; color:#aaa; }
    .btn-outline.active { border-color:#7873f5; color:#7873f5; }
    .screen-fade { animation: screenFadeIn 0.4s ease; }
    @keyframes screenFadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    /* === HEADER === */
    header { text-align:center; padding:40px 20px 10px; }
    header h1 { font-family:'Orbitron',sans-serif; font-size:2.5rem; font-weight:900; background:linear-gradient(135deg,#ff6ec7,#7873f5,#4adede); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; letter-spacing:3px; text-transform:uppercase; margin-bottom:8px; display:flex; align-items:center; justify-content:center; gap:12px; }
    header h1 svg { width:48px; height:48px; -webkit-text-fill-color:initial; }
    .alpha-tag { font-size:0.45rem; padding:3px 8px; border-radius:4px; background:rgba(120,115,245,0.15); border:1px solid rgba(120,115,245,0.3); color:#7873f5; letter-spacing:2px; text-transform:uppercase; -webkit-text-fill-color:initial; vertical-align:super; margin-left:4px; }
    header p { color:#888; font-size:1.1rem; letter-spacing:1px; }

    /* === SEARCH === */
    .search-container { display:flex; justify-content:center; padding:16px 20px; gap:12px; flex-wrap:wrap; }
    .search-container input { width:420px; max-width:80vw; padding:14px 20px; border:2px solid #2a2a4a; border-radius:12px; background:rgba(20,20,40,0.8); color:#e0e0e0; font-size:1.05rem; font-family:'Rajdhani',sans-serif; transition:border-color 0.3s,box-shadow 0.3s; outline:none; }
    .search-container input:focus { border-color:#7873f5; box-shadow:0 0 20px rgba(120,115,245,0.2); }
    .search-container input::placeholder { color:#555; }
    .popular-repos { text-align:center; padding:0 20px 10px; }
    .popular-list { display:flex; flex-wrap:wrap; justify-content:center; gap:6px; }
    .popular-list button { padding:6px 14px; border:1px solid rgba(120,115,245,0.15); border-radius:20px; background:rgba(120,115,245,0.05); color:#777; font-family:'Rajdhani',sans-serif; font-size:0.8rem; cursor:pointer; transition:all 0.2s; }
    .popular-list button:hover { border-color:rgba(120,115,245,0.4); color:#bbb; background:rgba(120,115,245,0.1); }
    .top-bar { position:fixed; top:16px; right:20px; z-index:9000; display:flex; gap:10px; }
    .top-bar-btn { padding:10px 22px; border:1px solid #3a3a5a; border-radius:10px; background:rgba(15,15,35,0.9); backdrop-filter:blur(10px); color:#999; cursor:pointer; font-family:'Orbitron',sans-serif; font-size:0.7rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; transition:all 0.2s; }
    .top-bar-btn:hover { border-color:#7873f5; color:#fff; background:rgba(120,115,245,0.15); }
    #loading { display:none; text-align:center; padding:60px 20px; }
    .progress-container { max-width:460px; margin:0 auto; }
    .progress-steps { display:flex; flex-direction:column; gap:14px; margin-bottom:24px; text-align:left; }
    .progress-step { display:flex; align-items:center; gap:12px; opacity:0.3; transition:opacity 0.3s; }
    .progress-step.active { opacity:1; }
    .progress-step.done { opacity:0.6; }
    .step-icon { width:28px; height:28px; border-radius:50%; border:2px solid #333; display:flex; align-items:center; justify-content:center; font-size:0.7rem; flex-shrink:0; transition:all 0.3s; }
    .progress-step.active .step-icon { border-color:#7873f5; color:#7873f5; box-shadow:0 0 12px rgba(120,115,245,0.3); }
    .progress-step.done .step-icon { border-color:#4ade80; color:#4ade80; background:rgba(74,222,128,0.1); }
    .step-text { font-family:'Orbitron',sans-serif; font-size:0.7rem; color:#888; letter-spacing:1px; }
    .progress-step.active .step-text { color:#ccc; }
    .step-detail { font-size:0.65rem; color:#555; margin-left:40px; margin-top:-8px; font-family:'Rajdhani',sans-serif; letter-spacing:0.5px; }
    .progress-bar-wrap { height:6px; background:#1a1a3a; border-radius:3px; overflow:hidden; margin-top:8px; }
    .progress-bar-fill { height:100%; width:0%; background:linear-gradient(90deg,#7873f5,#4adede); border-radius:3px; transition:width 0.3s ease; }
    #error { display:none; text-align:center; padding:20px; color:#ff6b6b; font-size:1.1rem; }

    /* === REPO INFO === */
    #repo-info { display:none; text-align:center; padding:10px 20px 20px; }
    .repo-info-inner { display:inline-flex; align-items:center; gap:20px; padding:12px 28px; border:1px solid rgba(120,115,245,0.15); border-radius:14px; background:rgba(120,115,245,0.03); }
    #repo-info h2 { font-family:'Orbitron',sans-serif; font-size:1rem; color:#ccc; letter-spacing:2px; margin:0; }
    #repo-info h2 span { color:#4adede; }
    .repo-info-sep { width:1px; height:24px; background:rgba(120,115,245,0.2); }
    .collection-progress { color:#888; font-size:0.75rem; font-family:'Orbitron',sans-serif; letter-spacing:1px; }
    .collection-progress span { color:#4adede; }
    .action-buttons { display:flex; gap:10px; justify-content:center; margin-top:14px; flex-wrap:wrap; align-items:center; }

    /* === FILTERS === */
    .filter-bar { display:flex; gap:8px; justify-content:center; align-items:center; margin-top:16px; flex-wrap:wrap; }
    .filter-btn { padding:6px 16px; border:1px solid #333; border-radius:8px; background:none; color:#666; font-family:'Orbitron',sans-serif; font-size:0.6rem; font-weight:700; letter-spacing:1.5px; cursor:pointer; transition:all 0.2s; text-transform:uppercase; }
    .filter-btn:hover { border-color:#555; color:#aaa; }
    .filter-btn.active { color:#fff; border-color:transparent; }
    .filter-btn.active[data-rarity="all"] { background:linear-gradient(135deg,#7873f5,#4adede); }
    .filter-btn.active[data-rarity="mythic"] { background:linear-gradient(135deg,#ff0040,#ff6600,#ff0040); background-size:200% 200%; animation:mythicBtn 2s ease infinite; color:#fff; }
    @keyframes mythicBtn { 0%,100% { background-position:0% 50%; } 50% { background-position:100% 50%; } }
    .filter-btn.active[data-rarity="legendary"] { background:linear-gradient(135deg,#ffd700,#ff6ec7); color:#000; }
    .filter-btn.active[data-rarity="epic"] { background:linear-gradient(135deg,#a855f7,#6366f1); }
    .filter-btn.active[data-rarity="rare"] { background:linear-gradient(135deg,#3b82f6,#06b6d4); }
    .filter-btn.active[data-rarity="common"] { background:#4a4a6a; }
    .filter-sep { width:1px; height:20px; background:#333; margin:0 4px; }
    .card-search { width:160px; padding:6px 14px; border:1px solid #333; border-radius:8px; background:rgba(20,20,40,0.6); color:#ccc; font-family:'Rajdhani',sans-serif; font-size:0.85rem; outline:none; transition:border-color 0.2s; }
    .card-search:focus { border-color:#7873f5; }
    .card-search::placeholder { color:#555; }

    /* === GALLERY CARDS === */
    #cards-grid { display:flex; flex-wrap:wrap; justify-content:center; gap:36px; padding:10px 30px 60px; }
    .card-wrapper { perspective:1200px; width:320px; height:480px; opacity:0; transform:translateY(30px); animation:cardEnter 0.5s ease forwards; position:relative; }
    @keyframes cardEnter { to { opacity:1; transform:translateY(0); } }
    .card { position:relative; width:100%; height:100%; border-radius:18px; overflow:hidden; transition:transform 0.15s ease-out; transform-style:preserve-3d; cursor:default; }

    /* Outer border glow */
    .card::before { content:''; position:absolute; inset:-2px; border-radius:20px; z-index:-1; }
    .card[data-rarity="mythic"]::before { inset:-4px; background:linear-gradient(135deg,#ff0040,#ff6600,#ff0040,#ff00ff,#ff0040); background-size:400% 400%; animation:mythicGlow 2s ease infinite; }
    @keyframes mythicGlow { 0%,100% { background-position:0% 50%; } 50% { background-position:100% 50%; } }
    .card[data-rarity="legendary"]::before { inset:-3px; background:linear-gradient(135deg,#ffd700,#ff6ec7,#ffd700,#ff6ec7); background-size:300% 300%; animation:legendaryGlow 3s ease infinite; }
    .card[data-rarity="epic"]::before { inset:-3px; background:linear-gradient(135deg,#a855f7,#6366f1,#a855f7); background-size:300% 300%; animation:legendaryGlow 4s ease infinite; }
    .card[data-rarity="rare"]::before { background:linear-gradient(135deg,#3b82f6,#06b6d4,#3b82f6); background-size:300% 300%; animation:legendaryGlow 5s ease infinite; }
    .card[data-rarity="common"]::before { background:#3a3a5a; }
    @keyframes legendaryGlow { 0%,100% { background-position:0% 50%; } 50% { background-position:100% 50%; } }

    /* Outer aura glow — legendary gets huge pulsing aura, epic gets medium */
    .card::after { content:''; position:absolute; inset:-8px; border-radius:26px; z-index:-2; pointer-events:none; opacity:0; }
    .card[data-rarity="mythic"]::after { opacity:1; background:conic-gradient(from 0deg, rgba(255,0,64,0.5), rgba(255,100,0,0.4), rgba(255,0,255,0.3), rgba(255,0,64,0.5)); filter:blur(20px); animation:auraRotate 2.5s linear infinite, mythicAuraPulse 1.5s ease-in-out infinite alternate; }
    @keyframes mythicAuraPulse { 0% { opacity:0.6; inset:-10px; } 100% { opacity:1; inset:-20px; } }
    .card[data-rarity="legendary"]::after { opacity:1; background:conic-gradient(from 0deg, rgba(255,215,0,0.3), rgba(255,110,199,0.3), rgba(255,215,0,0.3)); filter:blur(15px); animation:auraRotate 4s linear infinite, auraPulse 2s ease-in-out infinite alternate; }
    .card[data-rarity="epic"]::after { opacity:0.5; background:conic-gradient(from 0deg, rgba(168,85,247,0.12), rgba(99,102,241,0.12), rgba(168,85,247,0.12)); filter:blur(12px); animation:auraRotate 6s linear infinite; }
    @keyframes auraRotate { 0% { transform:rotate(0deg); } 100% { transform:rotate(360deg); } }
    @keyframes auraPulse { 0% { opacity:0.5; inset:-8px; } 100% { opacity:1; inset:-14px; } }

    .card-inner { position:relative; width:100%; height:100%; border-radius:18px; overflow:hidden; }
    .card[data-rarity="mythic"] .card-inner { background:linear-gradient(165deg,#1a0a0a,#200810,#1a0508); }
    .card[data-rarity="legendary"] .card-inner { background:linear-gradient(165deg,#1a1420,#201530,#150f24); }
    .card[data-rarity="epic"] .card-inner { background:linear-gradient(165deg,#161428,#1a1538,#110f24); }
    .card[data-rarity="rare"] .card-inner { background:linear-gradient(165deg,#121428,#151a35,#0f1224); }
    .card[data-rarity="common"] .card-inner { background:linear-gradient(165deg,#141428,#1a1a35,#0f0f24); }

    /* Inner ambient glow for legendary/epic */
    .card[data-rarity="mythic"] .card-inner::before { content:''; position:absolute; inset:0; border-radius:18px; background:radial-gradient(ellipse at 50% 0%, rgba(255,0,64,0.15) 0%, rgba(255,100,0,0.05) 40%, transparent 70%); pointer-events:none; z-index:1; animation:innerGlow 2s ease-in-out infinite alternate; }
    .card[data-rarity="legendary"] .card-inner::before { content:''; position:absolute; inset:0; border-radius:18px; background:radial-gradient(ellipse at 50% 0%, rgba(255,215,0,0.08) 0%, transparent 60%); pointer-events:none; z-index:1; animation:innerGlow 3s ease-in-out infinite alternate; }
    .card[data-rarity="epic"] .card-inner::before { content:''; position:absolute; inset:0; border-radius:18px; background:radial-gradient(ellipse at 50% 0%, rgba(168,85,247,0.06) 0%, transparent 60%); pointer-events:none; z-index:1; }
    @keyframes innerGlow { 0% { opacity:0.5; } 100% { opacity:1; } }

    .card-shine { position:absolute; inset:0; z-index:10; pointer-events:none; border-radius:18px; opacity:0; transition:opacity 0.3s; }
    .card:hover .card-shine { opacity:1; }

    /* Holo pattern — always on for legendary, hover for epic */
    .card[data-rarity="mythic"] .card-holo,.card[data-rarity="legendary"] .card-holo,.card[data-rarity="epic"] .card-holo { position:absolute; inset:0; z-index:9; pointer-events:none; border-radius:18px; opacity:0; transition:opacity 0.4s; background:repeating-conic-gradient(rgba(255,120,200,0.04) 0deg,transparent 4deg,rgba(120,200,255,0.04) 8deg,transparent 12deg); mix-blend-mode:screen; }
    .card[data-rarity="mythic"] .card-holo { opacity:0.8; animation:holoShift 4s linear infinite; background:repeating-conic-gradient(rgba(255,0,64,0.06) 0deg,transparent 3deg,rgba(255,100,0,0.06) 6deg,transparent 9deg); }
    .card[data-rarity="mythic"]:hover .card-holo { opacity:1; }
    .card[data-rarity="legendary"] .card-holo { opacity:0.6; animation:holoShift 8s linear infinite; }
    .card[data-rarity="legendary"]:hover .card-holo { opacity:1; }
    .card[data-rarity="epic"] .card-holo { opacity:0.15; animation:holoShift 12s linear infinite; }
    .card[data-rarity="epic"]:hover .card-holo { opacity:0.5; }
    @keyframes holoShift { 0% { background:repeating-conic-gradient(from 0deg, rgba(255,120,200,0.04) 0deg,transparent 4deg,rgba(120,200,255,0.04) 8deg,transparent 12deg); } 100% { background:repeating-conic-gradient(from 360deg, rgba(255,120,200,0.04) 0deg,transparent 4deg,rgba(120,200,255,0.04) 8deg,transparent 12deg); } }

    /* Holographic rainbow sweep — always on for legendary, hover for epic */
    .card[data-rarity="mythic"] .card-rainbow,
    .card[data-rarity="legendary"] .card-rainbow,
    .card[data-rarity="epic"] .card-rainbow {
      position:absolute; inset:0; z-index:11; pointer-events:none; border-radius:18px; opacity:0; transition:opacity 0.4s;
      background:linear-gradient(115deg, transparent 20%, rgba(255,0,0,0.06) 30%, rgba(255,165,0,0.06) 35%, rgba(255,255,0,0.06) 40%, rgba(0,255,0,0.06) 45%, rgba(0,200,255,0.06) 50%, rgba(128,0,255,0.06) 55%, transparent 70%);
      background-size:200% 200%; mix-blend-mode:screen;
    }
    .card[data-rarity="mythic"] .card-rainbow { opacity:0.9; animation:rainbowSweep 1.5s ease infinite; }
    .card[data-rarity="mythic"]:hover .card-rainbow { opacity:1; animation:rainbowSweep 1s ease infinite; }
    .card[data-rarity="legendary"] .card-rainbow { opacity:0.7; animation:rainbowSweep 3s ease infinite; }
    .card[data-rarity="epic"] .card-rainbow { opacity:0.2; animation:rainbowSweep 5s ease infinite; }
    .card[data-rarity="legendary"]:hover .card-rainbow { opacity:1; animation:rainbowSweep 2s ease infinite; }
    .card[data-rarity="epic"]:hover .card-rainbow { opacity:0.5; animation:rainbowSweep 3s ease infinite; }
    @keyframes rainbowSweep { 0% { background-position:-50% 0; } 100% { background-position:150% 0; } }

    /* Sparkle particles — legendary gets lots, epic gets some */
    .card[data-rarity="mythic"] .card-sparkles { position:absolute; inset:0; z-index:12; pointer-events:none; border-radius:18px; overflow:hidden; }
    .card[data-rarity="legendary"] .card-sparkles { position:absolute; inset:0; z-index:12; pointer-events:none; border-radius:18px; overflow:hidden; }
    .card[data-rarity="epic"] .card-sparkles { position:absolute; inset:0; z-index:12; pointer-events:none; border-radius:18px; overflow:hidden; opacity:0; transition:opacity 0.4s; }
    .card[data-rarity="epic"]:hover .card-sparkles { opacity:1; }
    .sparkle { position:absolute; border-radius:50%; animation:sparkleFloat var(--dur) ease-in-out infinite; animation-delay:var(--delay); opacity:0; }
    .card[data-rarity="mythic"] .sparkle { width:5px; height:5px; background:radial-gradient(circle, #fff, #ff0040); }
    .card[data-rarity="legendary"] .sparkle { width:4px; height:4px; background:radial-gradient(circle, #fff, #ffd700); }
    .card[data-rarity="epic"] .sparkle { width:3px; height:3px; background:radial-gradient(circle, #fff, #c084fc); }
    @keyframes sparkleFloat { 0% { opacity:0; transform:translateY(0) scale(0); } 20% { opacity:1; transform:translateY(-10px) scale(1); } 80% { opacity:1; transform:translateY(-30px) scale(0.8); } 100% { opacity:0; transform:translateY(-50px) scale(0); } }

    /* Legendary pulsing power value */
    .card[data-rarity="mythic"] .power-value { animation:mythicPowerPulse 1.5s ease-in-out infinite alternate; text-shadow:0 0 12px rgba(255,0,64,0.7); }
    @keyframes mythicPowerPulse { 0% { text-shadow:0 0 8px rgba(255,0,64,0.4); } 100% { text-shadow:0 0 20px rgba(255,0,64,1), 0 0 40px rgba(255,100,0,0.5), 0 0 60px rgba(255,0,255,0.2); } }
    .card[data-rarity="legendary"] .power-value { animation:powerPulse 2s ease-in-out infinite alternate; text-shadow:0 0 8px rgba(255,215,0,0.5); }
    .card[data-rarity="epic"] .power-value { text-shadow:0 0 6px rgba(168,85,247,0.4); }
    @keyframes powerPulse { 0% { text-shadow:0 0 8px rgba(255,215,0,0.3); } 100% { text-shadow:0 0 16px rgba(255,215,0,0.8), 0 0 30px rgba(255,110,199,0.3); } }

    /* Rarity badge glow */
    .rarity-badge.mythic { background:linear-gradient(135deg,rgba(255,0,64,0.4),rgba(255,100,0,0.4)); color:#ff0040; border:1px solid rgba(255,0,64,0.6); animation:mythicBadgeGlow 1.5s ease-in-out infinite alternate; }
    @keyframes mythicBadgeGlow { 0% { box-shadow:0 0 6px rgba(255,0,64,0.3); } 100% { box-shadow:0 0 16px rgba(255,0,64,0.7), 0 0 30px rgba(255,100,0,0.3); } }
    .rarity-badge.legendary { animation:badgeGlow 2s ease-in-out infinite alternate; }
    @keyframes badgeGlow { 0% { box-shadow:0 0 4px rgba(255,215,0,0.2); } 100% { box-shadow:0 0 12px rgba(255,215,0,0.5), 0 0 20px rgba(255,110,199,0.2); } }

    .card-top { position:relative; height:155px; }
    .card-top-bg { position:absolute; inset:0; opacity:0.25; filter:blur(20px) saturate(1.5); overflow:hidden; }
    .card-top-bg img { width:100%; height:100%; object-fit:cover; }
    .card-top-overlay { position:absolute; inset:0; background:linear-gradient(180deg,transparent 30%,#141428 100%); }

    /* Title chip (top left) */
    .title-chip { position:absolute; top:30px; left:14px; z-index:5; font-family:'Orbitron',sans-serif; font-size:0.5rem; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; padding:4px 10px; border-radius:6px; background:rgba(0,0,0,0.6); border:1px solid rgba(255,255,255,0.1); }

    .rarity-badge { position:absolute; top:30px; right:14px; z-index:5; font-family:'Orbitron',sans-serif; font-size:0.55rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; padding:4px 10px; border-radius:6px; }
    .rarity-badge.legendary { background:linear-gradient(135deg,rgba(255,215,0,0.3),rgba(255,110,199,0.3)); color:#ffd700; border:1px solid rgba(255,215,0,0.4); }
    .rarity-badge.epic { background:rgba(168,85,247,0.25); color:#c084fc; border:1px solid rgba(168,85,247,0.4); }
    .rarity-badge.rare { background:rgba(59,130,246,0.2); color:#60a5fa; border:1px solid rgba(59,130,246,0.4); }
    .rarity-badge.common { background:rgba(100,100,130,0.3); color:#888; border:1px solid rgba(100,100,130,0.4); }
    .avatar-container { position:absolute; bottom:-35px; left:50%; transform:translateX(-50%); z-index:5; }
    .avatar-ring { width:82px; height:82px; border-radius:50%; padding:3px; }
    .card[data-rarity="mythic"] .avatar-ring { background:linear-gradient(135deg,#ff0040,#ff6600,#ff00ff); background-size:200% 200%; animation:mythicGlow 2s ease infinite; }
    .card[data-rarity="legendary"] .avatar-ring { background:linear-gradient(135deg,#ffd700,#ff6ec7); }
    .card[data-rarity="epic"] .avatar-ring { background:linear-gradient(135deg,#a855f7,#6366f1); }
    .card[data-rarity="rare"] .avatar-ring { background:linear-gradient(135deg,#3b82f6,#06b6d4); }
    .card[data-rarity="common"] .avatar-ring { background:#4a4a6a; }
    .avatar-ring img { width:100%; height:100%; border-radius:50%; object-fit:cover; border:3px solid #141428; }
    .card-body { padding:46px 18px 14px; text-align:center; }
    .card-name { font-family:'Orbitron',sans-serif; font-size:1rem; font-weight:700; color:#fff; letter-spacing:1px; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .card-title { font-size:0.8rem; color:#888; letter-spacing:1px; text-transform:uppercase; margin-bottom:10px; }
    .power-bar { display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:12px; }
    .power-label { font-family:'Orbitron',sans-serif; font-size:0.5rem; color:#666; letter-spacing:2px; text-transform:uppercase; }
    .power-track { flex:1; max-width:140px; height:6px; background:#1a1a35; border-radius:3px; overflow:hidden; }
    .power-fill { height:100%; border-radius:3px; transition:width 1s ease-out; }
    .power-value { font-family:'Orbitron',sans-serif; font-size:0.85rem; font-weight:900; min-width:30px; text-align:right; }
    .stats-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; margin-bottom:10px; }
    .stat-box { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.05); border-radius:8px; padding:6px 4px; text-align:center; }
    .stat-value { font-family:'Orbitron',sans-serif; font-size:0.9rem; font-weight:700; line-height:1; }
    .stat-label { font-size:0.5rem; color:#666; letter-spacing:1px; text-transform:uppercase; margin-top:2px; }

    /* Ability trait */
    .ability-trait { display:flex; align-items:center; gap:8px; background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.06); border-radius:10px; padding:7px 12px; margin-bottom:8px; }
    .ability-icon { font-size:1.1rem; flex-shrink:0; }
    .ability-info { text-align:left; min-width:0; }
    .ability-name { font-family:'Orbitron',sans-serif; font-size:0.6rem; font-weight:700; letter-spacing:1px; }
    .ability-desc { font-size:0.68rem; color:#777; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    /* GitHub link — removed from card, now in fullscreen only */

    .card-header-repo { position:absolute; top:0; left:0; right:0; z-index:6; display:flex; align-items:center; justify-content:center; padding:5px 14px; font-family:'Orbitron',sans-serif; font-size:0.45rem; color:rgba(255,255,255,0.75); letter-spacing:1.5px; text-transform:uppercase; background:rgba(0,0,0,0.7); border-bottom:1px solid rgba(255,255,255,0.08); }
    .card-footer { position:absolute; bottom:0; left:0; right:0; display:flex; justify-content:space-between; align-items:center; padding:6px 16px; font-family:'Orbitron',sans-serif; font-size:0.45rem; color:#888; letter-spacing:1.5px; background:rgba(0,0,0,0.3); border-top:1px solid rgba(255,255,255,0.06); }
    .card-footer-brand { color:#7873f5; }
    .card-total-badge { position:absolute; bottom:-20px; left:50%; transform:translateX(-50%); font-family:'Orbitron',sans-serif; font-size:0.4rem; color:#666; letter-spacing:1px; white-space:nowrap; }

    /* === PACK OPENING OVERLAY === */
    .pack-overlay { position:fixed; inset:0; z-index:9000; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.92); backdrop-filter:blur(10px); animation:fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    .pack-container { text-align:center; position:relative; }
    .pack-wrapper { width:180px; height:260px; margin:0 auto 30px; position:relative; cursor:pointer; perspective:800px; }
    .pack-face { width:100%; height:100%; border-radius:4px 4px 6px 6px; position:relative; background:linear-gradient(170deg, #1a1a40 0%, #2d1b69 40%, #1a1a40 60%, #2d1b69 100%); border:2px solid rgba(120,115,245,0.4); display:flex; flex-direction:column; align-items:center; justify-content:center; box-shadow:0 0 40px rgba(120,115,245,0.2), 0 20px 60px rgba(0,0,0,0.5); transition:transform 0.3s, box-shadow 0.3s; overflow:hidden; }
    .pack-face:hover { transform:translateY(-4px) scale(1.02); box-shadow:0 0 60px rgba(120,115,245,0.35), 0 25px 70px rgba(0,0,0,0.6); }
    /* Foil sheen effect */
    .pack-face::before { content:''; position:absolute; inset:0; background:linear-gradient(105deg, transparent 20%, rgba(255,255,255,0.08) 35%, rgba(120,115,245,0.12) 42%, rgba(255,255,255,0.06) 50%, transparent 65%); animation:packSheen 3s ease infinite; }
    @keyframes packSheen { 0%,100% { opacity:0.3; transform:translateX(-20px); } 50% { opacity:1; transform:translateX(20px); } }
    /* Torn/serrated top edge */
    .pack-face::after { content:''; position:absolute; top:-6px; left:-2px; right:-2px; height:14px; background:linear-gradient(145deg, #1a1a40, #2d1b69); clip-path:polygon(0% 100%, 3% 40%, 6% 100%, 9% 40%, 12% 100%, 15% 50%, 18% 100%, 21% 40%, 24% 100%, 27% 50%, 30% 100%, 33% 40%, 36% 100%, 39% 50%, 42% 100%, 45% 40%, 48% 100%, 51% 50%, 54% 100%, 57% 40%, 60% 100%, 63% 50%, 66% 100%, 69% 40%, 72% 100%, 75% 50%, 78% 100%, 81% 40%, 84% 100%, 87% 50%, 90% 100%, 93% 40%, 96% 100%, 100% 50%, 100% 100%); z-index:2; }
    /* Side seams */
    .pack-seal-left, .pack-seal-right { position:absolute; top:10px; bottom:10px; width:3px; z-index:1; }
    .pack-seal-left { left:6px; background:linear-gradient(180deg, transparent, rgba(120,115,245,0.15) 20%, rgba(120,115,245,0.15) 80%, transparent); }
    .pack-seal-right { right:6px; background:linear-gradient(180deg, transparent, rgba(120,115,245,0.15) 20%, rgba(120,115,245,0.15) 80%, transparent); }

    /* Pack design */
    .pack-logo { margin-bottom:16px; position:relative; }
    .pack-logo-ring { width:70px; height:70px; border-radius:50%; border:3px solid rgba(120,115,245,0.4); display:flex; align-items:center; justify-content:center; background:rgba(120,115,245,0.08); position:relative; }
    .pack-logo-ring::after { content:''; position:absolute; inset:-6px; border-radius:50%; border:1px solid rgba(120,115,245,0.15); }
    .pack-logo svg { width:32px; height:32px; fill:rgba(120,115,245,0.7); }
    .pack-title { font-family:'Orbitron',sans-serif; font-size:0.7rem; color:#7873f5; letter-spacing:2px; text-transform:uppercase; max-width:85%; text-align:center; line-height:1.6; }
    .pack-owner { display:block; font-size:0.5rem; color:rgba(120,115,245,0.5); }
    .pack-repo { display:block; }
    .pack-subtitle { font-size:0.7rem; color:#445; margin-top:4px; letter-spacing:1px; }
    .pack-stripe { position:absolute; bottom:0; left:0; right:0; height:32px; background:linear-gradient(135deg,rgba(120,115,245,0.08),rgba(74,222,222,0.06)); border-top:1px solid rgba(120,115,245,0.12); display:flex; align-items:center; justify-content:center; }
    .pack-stripe span { font-family:'Orbitron',sans-serif; font-size:0.4rem; color:#445; letter-spacing:2px; text-transform:uppercase; }
    .pack-instruction { font-family:'Orbitron',sans-serif; font-size:0.65rem; color:#555; letter-spacing:2px; animation:pulseText 2s ease infinite; margin-top:24px; }
    @keyframes pulseText { 0%,100% { opacity:0.5; } 50% { opacity:1; } }
    .pack-close-btn { position:fixed; top:20px; right:24px; width:40px; height:40px; border:1px solid #3a3a5a; border-radius:50%; background:rgba(15,15,35,0.8); backdrop-filter:blur(10px); color:#888; cursor:pointer; font-size:1.2rem; display:flex; align-items:center; justify-content:center; transition:all 0.2s; z-index:9999; }
    .pack-close-btn:hover { border-color:#7873f5; color:#fff; background:rgba(120,115,245,0.15); }

    .pack-wrapper.tearing .pack-face { animation:packTear 0.6s ease forwards; }
    @keyframes packTear { 0% { transform:scale(1); filter:brightness(1); } 30% { transform:scale(1.05); filter:brightness(1.5); box-shadow:0 0 80px rgba(120,115,245,0.6); } 100% { transform:scale(1.3); opacity:0; filter:brightness(3); } }
    .pack-burst { position:absolute; inset:0; pointer-events:none; display:flex; align-items:center; justify-content:center; }
    .burst-ring { width:10px; height:10px; border-radius:50%; border:3px solid #7873f5; animation:burstExpand 0.8s ease forwards; opacity:0; }
    @keyframes burstExpand { 0% { width:10px; height:10px; opacity:1; border-width:3px; } 100% { width:600px; height:600px; opacity:0; border-width:1px; } }

    /* Card reveal — single row */
    .reveal-area { display:flex; gap:16px; justify-content:center; flex-wrap:nowrap; max-width:1200px; margin:0 auto; padding:0 20px; }

    /* Reveal slots */
    .reveal-slot { perspective:1200px; width:190px; height:293px; position:relative; flex-shrink:0; transition:transform 0.4s ease, filter 0.3s; }
    .reveal-slot.hoverable:hover { z-index:100; cursor:pointer; }
    .reveal-slot.hoverable:hover .reveal-card { transform:rotateY(0deg) scale(1.2) !important; }

    /* Unflipped cards — show back face, hide front */
    .reveal-slot.unflipped { cursor:pointer; }
    .reveal-slot.unflipped .reveal-card { transform:rotateY(180deg) scale(1); opacity:1; transition:transform 0.3s ease; }
    .reveal-slot.unflipped .reveal-card-front { visibility:hidden; }
    .reveal-slot.unflipped:hover .rarity-glow { opacity:0.5 !important; }
    .reveal-slot.unflipped:hover .reveal-card { transform:rotateY(180deg) scale(1.03); }

    /* Persistent rarity glow behind revealed cards */
    .reveal-slot .rarity-glow { position:absolute; inset:-10px; border-radius:24px; opacity:0; pointer-events:none; z-index:-1; transition:opacity 0.8s ease; }
    .reveal-slot.revealed .rarity-glow { opacity:1; }
    .reveal-slot[data-rarity="mythic"] .rarity-glow {
      background:radial-gradient(ellipse, rgba(255,0,64,0.6), rgba(255,100,0,0.3) 40%, transparent 70%);
      filter:blur(15px); animation:revealGlowPulse 1.5s ease-in-out infinite alternate;
    }
    .reveal-slot[data-rarity="legendary"] .rarity-glow {
      background:radial-gradient(ellipse, rgba(255,215,0,0.4), rgba(255,110,199,0.2) 40%, transparent 70%);
      filter:blur(12px); animation:revealGlowPulse 2s ease-in-out infinite alternate;
    }
    .reveal-slot[data-rarity="epic"] .rarity-glow {
      background:radial-gradient(ellipse, rgba(168,85,247,0.3), rgba(99,102,241,0.15) 40%, transparent 70%);
      filter:blur(10px); animation:revealGlowPulse 3s ease-in-out infinite alternate;
    }
    .reveal-slot[data-rarity="rare"] .rarity-glow {
      background:radial-gradient(ellipse, rgba(59,130,246,0.2), rgba(6,182,212,0.1) 40%, transparent 70%);
      filter:blur(8px); animation:revealGlowPulse 4s ease-in-out infinite alternate;
    }
    @keyframes revealGlowPulse { 0% { opacity:0.6; transform:scale(0.95); } 100% { opacity:1; transform:scale(1.05); } }
    .reveal-card { width:100%; height:100%; position:relative; transform-style:preserve-3d; transform:rotateY(180deg) scale(0.6); opacity:0; transition:none; -webkit-transform-style:preserve-3d; }

    /* Card back */
    .reveal-card-back { position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden; transform:rotateY(180deg); border-radius:14px; background:linear-gradient(145deg, #1a1a3a, #2a1a5a); border:2px solid #3a3a6a; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; overflow:hidden; }
    .reveal-card-back::before { content:''; position:absolute; inset:8px; border-radius:10px; border:1px solid rgba(120,115,245,0.2); background:repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(120,115,245,0.03) 10px, rgba(120,115,245,0.03) 20px); }
    .reveal-card-back::after { content:''; position:absolute; inset:16px; border-radius:8px; border:1px solid rgba(120,115,245,0.08); background:radial-gradient(ellipse at 50% 40%, rgba(120,115,245,0.06) 0%, transparent 70%); pointer-events:none; }
    .reveal-card-back-logo { position:relative; z-index:1; }
    .reveal-card-back-logo svg { width:32px; height:32px; fill:rgba(120,115,245,0.35); }
    .reveal-card-back-repo { position:relative; z-index:1; font-family:'Orbitron',sans-serif; font-size:0.65rem; color:rgba(200,195,255,0.9); letter-spacing:2px; text-transform:uppercase; text-align:center; max-width:85%; line-height:1.6; }
    .reveal-card-back-repo .repo-owner { display:block; font-size:0.5rem; color:rgba(200,195,255,0.65); }
    .reveal-card-back-repo .repo-name { display:block; }
    .reveal-card-back-brand { position:absolute; bottom:14px; z-index:1; font-family:'Orbitron',sans-serif; font-size:0.45rem; color:rgba(200,195,255,0.6); letter-spacing:2px; text-transform:uppercase; }

    /* Card front — holds a scaled-down gallery card */
    .reveal-card-front { position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden; border-radius:14px; overflow:hidden; }
    .reveal-card-front .card-wrapper { width:320px; height:480px; transform-origin:top left; perspective:none; animation:none; opacity:1; }
    .reveal-card-front .card { transition:none; }
    .reveal-card-front .card:hover .card-shine { opacity:0; }

    /* === RARITY REVEAL ANIMATIONS === */

    /* Show front face once any flip animation starts */
    .reveal-card.flip-common .reveal-card-front,
    .reveal-card.flip-rare .reveal-card-front,
    .reveal-card.flip-epic .reveal-card-front,
    .reveal-card.flip-legendary .reveal-card-front,
    .reveal-card.flip-mythic .reveal-card-front { visibility:visible; }

    /* COMMON — clean simple flip */
    .reveal-card.flip-common {
      animation:flipCommon 0.6s ease forwards;
    }
    @keyframes flipCommon {
      0% { transform:rotateY(180deg) scale(0.7) translateY(20px); opacity:0; }
      50% { opacity:1; }
      100% { transform:rotateY(0deg) scale(1) translateY(0); opacity:1; }
    }

    /* RARE — slightly dramatic with glow */
    .reveal-card.flip-rare {
      animation:flipRare 0.9s cubic-bezier(0.175,0.885,0.32,1.15) forwards;
    }
    @keyframes flipRare {
      0% { transform:rotateY(180deg) scale(0.5) translateY(30px); opacity:0; filter:brightness(1); }
      45% { opacity:1; filter:brightness(1.3); }
      70% { transform:rotateY(-10deg) scale(1.03) translateY(-5px); filter:brightness(1.5); }
      100% { transform:rotateY(0deg) scale(1) translateY(0); opacity:1; filter:brightness(1); }
    }
    .reveal-slot[data-rarity="rare"] .reveal-card.flip-rare {
      filter:drop-shadow(0 0 15px rgba(59,130,246,0.5));
    }

    /* Rare flash */
    .rare-flash {
      position:absolute; inset:-20px; border-radius:24px; opacity:0; pointer-events:none; z-index:20;
      background:radial-gradient(circle, rgba(59,130,246,0.35), transparent 65%);
      animation:rFlash 0.7s ease forwards;
    }
    @keyframes rFlash { 0% { opacity:0; transform:scale(0.5); } 25% { opacity:1; transform:scale(1.1); } 100% { opacity:0; transform:scale(1.4); } }

    /* EPIC — dramatic entrance, purple energy */
    .reveal-card.flip-epic {
      animation:flipEpic 1.1s cubic-bezier(0.175,0.885,0.32,1.275) forwards;
    }
    @keyframes flipEpic {
      0% { transform:rotateY(180deg) scale(0.3) translateY(60px); opacity:0; filter:brightness(1); }
      35% { opacity:1; transform:rotateY(90deg) scale(0.6) translateY(20px); filter:brightness(2); }
      55% { transform:rotateY(-15deg) scale(1.08) translateY(-8px); filter:brightness(1.8); }
      75% { transform:rotateY(5deg) scale(1.02) translateY(-2px); filter:brightness(1.2); }
      100% { transform:rotateY(0deg) scale(1) translateY(0); opacity:1; filter:brightness(1); }
    }
    .reveal-slot[data-rarity="epic"] .reveal-card.flip-epic {
      filter:drop-shadow(0 0 25px rgba(168,85,247,0.6));
    }

    /* Epic flash + ring */
    .epic-flash {
      position:absolute; inset:-40px; border-radius:30px; opacity:0; pointer-events:none; z-index:20;
      background:radial-gradient(circle, rgba(168,85,247,0.5), rgba(99,102,241,0.2) 40%, transparent 70%);
      animation:eFlash 0.9s ease forwards;
    }
    @keyframes eFlash { 0% { opacity:0; transform:scale(0.3); } 20% { opacity:1; transform:scale(1.2); } 100% { opacity:0; transform:scale(1.8); } }
    .epic-ring {
      position:absolute; inset:-30px; border-radius:50%; border:2px solid rgba(168,85,247,0.5); opacity:0; pointer-events:none; z-index:19;
      animation:epicRing 0.8s ease forwards;
    }
    @keyframes epicRing { 0% { opacity:0; transform:scale(0.5); } 30% { opacity:1; } 100% { opacity:0; transform:scale(2); } }

    /* MYTHIC — ABSOLUTELY INSANE entrance */
    .reveal-card.flip-mythic {
      animation:flipMythic 2s cubic-bezier(0.175,0.885,0.32,1.275) forwards;
    }
    @keyframes flipMythic {
      0% { transform:rotateY(180deg) rotateZ(10deg) scale(0.1) translateY(100px); opacity:0; filter:brightness(1) saturate(0.3); }
      15% { transform:rotateY(150deg) rotateZ(-5deg) scale(0.3) translateY(50px); opacity:1; filter:brightness(4) saturate(3); }
      30% { transform:rotateY(90deg) rotateZ(3deg) scale(0.7) translateY(0); filter:brightness(3) saturate(2); }
      45% { transform:rotateY(-30deg) rotateZ(-2deg) scale(1.2) translateY(-20px); filter:brightness(2.5); }
      55% { transform:rotateY(15deg) rotateZ(1deg) scale(1.15) translateY(-15px); filter:brightness(2); }
      65% { transform:rotateY(-10deg) scale(1.1) translateY(-10px); filter:brightness(1.8); }
      75% { transform:rotateY(5deg) scale(1.05) translateY(-5px); filter:brightness(1.4); }
      85% { transform:rotateY(-2deg) scale(1.02); filter:brightness(1.2); }
      100% { transform:rotateY(0deg) scale(1) translateY(0); opacity:1; filter:brightness(1) saturate(1); }
    }
    .reveal-slot[data-rarity="mythic"] .reveal-card.flip-mythic {
      filter:drop-shadow(0 0 50px rgba(255,0,64,0.9));
    }

    /* Mythic explosion effects */
    .mythic-flash {
      position:absolute; inset:-80px; border-radius:50px; opacity:0; pointer-events:none; z-index:20;
      background:radial-gradient(circle, rgba(255,0,64,0.8), rgba(255,100,0,0.4) 30%, rgba(255,0,255,0.2) 50%, transparent 70%);
      animation:mythFlash 1.5s ease forwards;
    }
    @keyframes mythFlash { 0% { opacity:0; transform:scale(0.1); } 10% { opacity:1; transform:scale(1.5); } 40% { opacity:0.8; transform:scale(2); } 100% { opacity:0; transform:scale(3.5); } }
    .mythic-ring {
      position:absolute; inset:-50px; border-radius:50%; border:4px solid rgba(255,0,64,0.8); opacity:0; pointer-events:none; z-index:19;
      animation:mythRing 1.2s ease forwards;
    }
    @keyframes mythRing { 0% { opacity:0; transform:scale(0.2); border-width:6px; } 15% { opacity:1; } 100% { opacity:0; transform:scale(4); border-width:1px; } }
    .mythic-ring2 {
      position:absolute; inset:-50px; border-radius:50%; border:3px solid rgba(255,100,0,0.6); opacity:0; pointer-events:none; z-index:18;
      animation:mythRing 1.4s 0.1s ease forwards;
    }
    .mythic-ring3 {
      position:absolute; inset:-50px; border-radius:50%; border:2px solid rgba(255,0,255,0.4); opacity:0; pointer-events:none; z-index:17;
      animation:mythRing 1.6s 0.2s ease forwards;
    }
    .screen-flash.mythic-screen {
      background:radial-gradient(circle at 50% 50%, rgba(255,0,64,0.4), rgba(255,100,0,0.2) 40%, transparent 70%);
      animation:screenFlash 1.2s ease forwards;
    }

    /* LEGENDARY — SPECTACULAR entrance */
    .reveal-card.flip-legendary {
      animation:flipLegendary 1.4s cubic-bezier(0.175,0.885,0.32,1.275) forwards;
    }
    @keyframes flipLegendary {
      0% { transform:rotateY(180deg) rotateZ(5deg) scale(0.2) translateY(80px); opacity:0; filter:brightness(1) saturate(0.5); }
      25% { transform:rotateY(120deg) rotateZ(-2deg) scale(0.5) translateY(30px); opacity:1; filter:brightness(3) saturate(2); }
      45% { transform:rotateY(45deg) rotateZ(1deg) scale(0.9) translateY(-10px); filter:brightness(2.5) saturate(1.5); }
      60% { transform:rotateY(-20deg) rotateZ(-1deg) scale(1.12) translateY(-15px); filter:brightness(2); }
      75% { transform:rotateY(8deg) scale(1.05) translateY(-5px); filter:brightness(1.5); }
      90% { transform:rotateY(-3deg) scale(1.01); filter:brightness(1.2); }
      100% { transform:rotateY(0deg) scale(1) translateY(0); opacity:1; filter:brightness(1) saturate(1); }
    }
    .reveal-slot[data-rarity="legendary"] .reveal-card.flip-legendary {
      filter:drop-shadow(0 0 35px rgba(255,215,0,0.7));
    }

    /* Legendary explosion effects */
    .legendary-flash {
      position:absolute; inset:-60px; border-radius:40px; opacity:0; pointer-events:none; z-index:20;
      background:radial-gradient(circle, rgba(255,215,0,0.6), rgba(255,110,199,0.3) 30%, transparent 65%);
      animation:legFlash 1.2s ease forwards;
    }
    @keyframes legFlash { 0% { opacity:0; transform:scale(0.2); } 15% { opacity:1; transform:scale(1.3); } 50% { opacity:0.6; transform:scale(1.6); } 100% { opacity:0; transform:scale(2.5); } }
    .legendary-ring {
      position:absolute; inset:-40px; border-radius:50%; border:3px solid rgba(255,215,0,0.6); opacity:0; pointer-events:none; z-index:19;
      animation:legRing 1s ease forwards;
    }
    @keyframes legRing { 0% { opacity:0; transform:scale(0.3); border-width:4px; } 20% { opacity:1; } 100% { opacity:0; transform:scale(3); border-width:1px; } }
    .legendary-ring2 {
      position:absolute; inset:-40px; border-radius:50%; border:2px solid rgba(255,110,199,0.4); opacity:0; pointer-events:none; z-index:18;
      animation:legRing 1.2s 0.15s ease forwards;
    }

    /* Legendary particle explosion */
    .leg-particles { position:absolute; inset:-60px; pointer-events:none; z-index:21; overflow:visible; }
    .leg-particle {
      position:absolute; width:6px; height:6px; border-radius:50%;
      left:50%; top:50%;
      animation:legParticle var(--pdur) ease-out forwards;
      animation-delay:var(--pdelay);
      opacity:0;
    }
    @keyframes legParticle {
      0% { opacity:1; transform:translate(0,0) scale(1); }
      100% { opacity:0; transform:translate(var(--px), var(--py)) scale(0); }

    /* Screen flash for legendary/epic */
    .screen-flash {
      position:fixed; inset:0; z-index:8999; pointer-events:none;
    }
    .screen-flash.legendary-screen {
      background:radial-gradient(circle at 50% 50%, rgba(255,215,0,0.25), transparent 60%);

    /* Screen shake for legendary */
    .shake-screen { animation:screenShake 0.5s ease; }
    @keyframes screenShake {
      0%,100% { transform:translate(0,0); }
      10% { transform:translate(-3px, 2px); }

    /* NEW badge for reveal — positioned below card, persistent */

    .reveal-buttons { display:flex; gap:12px; margin-top:50px; opacity:0; animation:fadeInUp 0.4s ease forwards; justify-content:center; }
    .reveal-done-btn { padding:14px 40px; border:none; border-radius:12px; background:linear-gradient(135deg,#7873f5,#4adede); color:#fff; font-family:'Orbitron',sans-serif; font-size:0.75rem; font-weight:700; letter-spacing:1px; cursor:pointer; transition:transform 0.2s, box-shadow 0.3s; text-transform:uppercase; }
    .reveal-done-btn:hover { transform:translateY(-2px); box-shadow:0 6px 25px rgba(120,115,245,0.35); }
    .reveal-another-btn { padding:14px 40px; border:1px solid #444; border-radius:12px; background:none; color:#888; font-family:'Orbitron',sans-serif; font-size:0.75rem; font-weight:700; letter-spacing:1px; cursor:pointer; transition:transform 0.2s, box-shadow 0.3s, color 0.2s, border-color 0.2s; text-transform:uppercase; }
    .reveal-another-btn:hover { transform:translateY(-2px); color:#ccc; border-color:#666; }
    @keyframes fadeInUp { from { opacity:0; transform:translateY(15px); } to { opacity:1; transform:translateY(0); } }

    /* === EMPTY STATE === */
    .empty-library { text-align:center; padding:60px 20px; color:#444; }
    .empty-library .empty-icon { font-size:3rem; margin-bottom:16px; opacity:0.3; }
    .empty-library .empty-icon svg { width:60px; height:60px; fill:#333; }
    .empty-library p { font-family:'Orbitron',sans-serif; font-size:0.8rem; letter-spacing:2px; }

    .card-wrapper:hover .card { z-index:10; }
    .card-wrapper.clickable { cursor:pointer; }
    .ghost-card { opacity:0.25 !important; filter:grayscale(1); cursor:pointer; transition:opacity 0.3s, filter 0.3s; animation:none !important; transform:none !important; }
    .ghost-card .card { filter:grayscale(1); }
    .ghost-card:hover { opacity:0.5 !important; }
    .ghost-card .card::before, .ghost-card .card::after { display:none; }
    .ghost-card .card-sparkles { display:none; }
    /* Pause all animations and effects on offscreen cards */
    .offscreen .card, .offscreen .card *, .offscreen .card::before, .offscreen .card::after, .offscreen .card-inner::before { animation-play-state:paused !important; }
    .offscreen .card::after { display:none; }
    .offscreen .card-sparkles { display:none; }
    .offscreen .card-holo, .offscreen .card-rainbow { display:none; }
    .card-qty { position:absolute; bottom:6px; right:6px; font-family:'Orbitron',sans-serif; font-size:0.55rem; color:#aaa; background:rgba(0,0,0,0.6); border:1px solid rgba(255,255,255,0.1); border-radius:6px; padding:2px 8px; letter-spacing:1px; pointer-events:none; z-index:20; }

    /* === FULLSCREEN CARD OVERLAY === */
    .fullscreen-overlay { position:fixed; inset:0; z-index:10000; display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.9); backdrop-filter:blur(12px); animation:fadeIn 0.3s ease; cursor:pointer; }
    .fullscreen-layout { display:flex; align-items:center; gap:40px; position:relative; }
    .fullscreen-card-container { position:relative; width:360px; perspective:1200px; animation:fullscreenPop 0.4s cubic-bezier(0.175,0.885,0.32,1.275) forwards; flex-shrink:0; }
    .fullscreen-stats-panel { width:280px; flex-shrink:0; animation:fadeIn 0.5s ease 0.2s both; }

    .fs-stat-row { padding:12px 0; border-bottom:1px solid rgba(255,255,255,0.05); }
    .fs-stat-top { display:flex; justify-content:space-between; align-items:center; }
    .fs-stat-label { font-family:'Orbitron',sans-serif; font-size:0.65rem; color:#666; letter-spacing:1px; text-transform:uppercase; }
    .fs-stat-value { font-family:'Orbitron',sans-serif; font-size:0.8rem; color:#ccc; letter-spacing:1px; }

    .fs-pct-inline { display:flex; align-items:center; gap:10px; margin-top:6px; }
    .fs-pct-track { flex:1; height:5px; background:rgba(255,255,255,0.06); border-radius:3px; overflow:hidden; }
    .fs-pct-fill { height:100%; border-radius:3px; }

    .fs-stat-row.fs-highlight { background:rgba(255,255,255,0.06); border-radius:8px; padding:12px 10px; margin:0 -10px; border-bottom:1px solid; border-left:3px solid; }
    .fs-stat-row.fs-highlight .fs-stat-value { color:#fff; font-weight:700; }
    .fs-stat-row.fs-highlight .fs-stat-label { font-weight:600; }
    @media (max-width: 800px) { .fullscreen-layout { flex-direction:column; gap:20px; } .fullscreen-stats-panel { width:320px; } }
    @keyframes fullscreenPop { 0% { opacity:0; transform:scale(0.7); } 100% { opacity:1; transform:scale(1); } }
    .fullscreen-card-container .card-wrapper { width:320px; height:480px; opacity:1; animation:none; transform:scale(1.15); transform-origin:center center; margin-bottom:40px; }
    .fullscreen-card-container .card { cursor:default; }
    .fullscreen-close { position:absolute; top:-40px; right:-10px; font-family:'Orbitron',sans-serif; font-size:0.65rem; color:#666; letter-spacing:2px; cursor:pointer; padding:6px 12px; transition:color 0.2s; z-index:10; border:1px solid #333; border-radius:6px; }
    .fullscreen-close:hover { color:#fff; border-color:#666; }
    .fullscreen-profile { display:flex; align-items:center; justify-content:center; gap:8px; margin-top:16px; padding:12px 28px; border:none; border-radius:10px; background:linear-gradient(135deg,#24292f,#333); color:#fff; font-family:'Orbitron',sans-serif; font-size:0.75rem; font-weight:700; letter-spacing:1.5px; cursor:pointer; transition:transform 0.2s, box-shadow 0.3s, background 0.3s; text-decoration:none; text-transform:uppercase; }
    .fullscreen-profile:hover { transform:translateY(-2px); box-shadow:0 6px 25px rgba(0,0,0,0.4); background:linear-gradient(135deg,#333,#444); }
    .fullscreen-ghost .fullscreen-card-container { opacity:0.25; filter:grayscale(1); }
    .fullscreen-ghost .fullscreen-stats-panel { opacity:0.4; filter:grayscale(1); }
    .fullscreen-profile svg { width:16px; height:16px; fill:#fff; }

    @media (max-width:600px) {
      header h1 { font-size:1.5rem; }
      .card-wrapper { width:290px; height:450px; }
      .reveal-area { gap:8px; padding:0 10px; }
      .reveal-slot { width:120px; height:185px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important; }
      .screen-flash, .mythic-flash, .legendary-flash, .epic-flash, .rare-flash { display:none !important; }
      .shake-screen { animation:none !important; }
      .pack-burst, .burst-ring { display:none !important; }
      .card-sparkles { display:none !important; }
      .card-holo, .card-rainbow { opacity:0 !important; }
      .card::after { animation:none !important; }
      .card:hover .card-holo, .card:hover .card-rainbow { opacity:0 !important; }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <button class="top-bar-btn" onclick="clearRepoCache()">Clear Cache</button>
    <button class="top-bar-btn" id="share-btn" onclick="shareRepo()">Share</button>
  </div>
  <div id="gallery-screen">
    <header><h1><svg viewBox="0 0 32 32"><defs><linearGradient id="gp-header" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#7873f5"/><stop offset="100%" style="stop-color:#4adede"/></linearGradient></defs><rect x="4" y="2" width="18" height="26" rx="3" fill="none" stroke="url(#gp-header)" stroke-width="2" opacity="0.4" transform="rotate(-6 13 15)"/><rect x="8" y="3" width="18" height="26" rx="3" fill="none" stroke="url(#gp-header)" stroke-width="2" opacity="0.7" transform="rotate(3 17 16)"/><rect x="6" y="2.5" width="18" height="26" rx="3" fill="none" stroke="url(#gp-header)" stroke-width="2.5"/><text x="15" y="20.5" font-family="sans-serif" font-weight="900" font-size="14" fill="url(#gp-header)" text-anchor="middle">G</text></svg>GitPacks<span class="alpha-tag">Alpha</span></h1><p>Collect the contributors behind the code.</p></header>
    <div class="search-container" id="search-container" style="display:none">
      <input type="text" id="repo-input" value="strangerstudios/paid-memberships-pro" />

          <div class="progress-step" id="step-commits"><div class="step-icon">1</div><span class="step-text">Fetching commit stats</span></div>
          <div class="progress-step" id="step-issues"><div class="step-icon">2</div><span class="step-text">Fetching issues &amp; PRs</span></div>
          <div class="progress-step" id="step-processing"><div class="step-icon">3</div><span class="step-text">Generating cards</span></div>

        <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill"></div></div>

  </div>

<script>
const GH_ICON = `<svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>`;
// GitPacks logo — stylized card/pack icon
const GP_ICON = `<svg viewBox="0 0 32 32"><defs><linearGradient id="gp-grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#7873f5"/><stop offset="100%" style="stop-color:#4adede"/></linearGradient></defs><rect x="4" y="2" width="18" height="26" rx="3" fill="none" stroke="url(#gp-grad)" stroke-width="2" opacity="0.4" transform="rotate(-6 13 15)"/><rect x="8" y="3" width="18" height="26" rx="3" fill="none" stroke="url(#gp-grad)" stroke-width="2" opacity="0.7" transform="rotate(3 17 16)"/><rect x="6" y="2.5" width="18" height="26" rx="3" fill="none" stroke="url(#gp-grad)" stroke-width="2.5"/><text x="15" y="20.5" font-family="sans-serif" font-weight="900" font-size="14" fill="url(#gp-grad)" text-anchor="middle">G</text></svg>`;

const input = document.getElementById('repo-input');
const btn = document.getElementById('generate-btn');
const grid = document.getElementById('cards-grid');
const loading = document.getElementById('loading');
const errorEl = document.getElementById('error');
const repoInfo = document.getElementById('repo-info');

let allContributors = [];
let library = {}; // { login: count }
let repoLoaded = false;
let currentRepoName = '';
let filterRarity = 'all';
let showMissing = false;
let cardSearch = '';

const searchContainer = document.getElementById('search-container');

// Token management
let ghToken = '';

// Progress bar helpers
function setProgress(step, pct, detail) {
  ['step-commits','step-issues','step-processing'].forEach(id => {
    document.getElementById(id).className = 'progress-step';
  });
  const steps = ['step-commits','step-issues','step-processing'];
  const idx = steps.indexOf(step);
  for (let i = 0; i < idx; i++) document.getElementById(steps[i]).className = 'progress-step done';
  if (idx >= 0) document.getElementById(step).className = 'progress-step active';
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-detail').textContent = detail || '';
}

input.addEventListener('keydown', e => { if (e.key === 'Enter') loadRepo(); });

function quickLoad(repo) { input.value = repo; loadRepo(); }

// ===== LOAD REPO =====
// Cache helpers — IndexedDB for cross-reload persistence
const CACHE_TTL = 60 * 60 * 1000; // 1 hour
function openCacheDB() {
  return new Promise(function(resolve, reject) {
    const req = indexedDB.open('ghtc_cache', 1);
    req.onupgradeneeded = function() { req.result.createObjectStore('repos'); };
    req.onsuccess = function() { resolve(req.result); };
    req.onerror = function() { reject(req.error); };
  });
}
async function getCachedRepo(key) {
  try {
    const db = await openCacheDB();
    return new Promise(function(resolve) {
      const tx = db.transaction('repos', 'readonly');
      const req = tx.objectStore('repos').get(key);
      req.onsuccess = function() {
        const entry = req.result;
        if (!entry || !entry.ts || !entry.data) { resolve(null); return; }
        if (Date.now() - entry.ts > CACHE_TTL) { resolve(null); return; }
        console.log('[GHTC] Cache hit for', key);
        resolve(entry.data);
      };
      req.onerror = function() { resolve(null); };
    });
  } catch (e) { return null; }
}
async function setCachedRepo(key, data) {
  try {
    const db = await openCacheDB();
    const tx = db.transaction('repos', 'readwrite');
    tx.objectStore('repos').put({ ts: Date.now(), data: data }, key);
    console.log('[GHTC] Cached', key);
  } catch (e) { console.warn('[GHTC] Cache save failed:', e.message); }
}

async function clearRepoCache() {
  try {
    const db = await openCacheDB();
    const tx = db.transaction('repos', 'readwrite');
    tx.objectStore('repos').clear();
    console.log('[GHTC] Cache cleared');
  } catch (e) { console.warn('[GHTC] Cache clear failed:', e.message); }
  loadRepo();
}

// Auto-load from URL param or default to PMPro
const urlRepo = new URLSearchParams(window.location.search).get('repo');
if (urlRepo) { input.value = urlRepo; }
loadRepo();
function saveLibrary() {
  if (!currentRepoName) return;
  try { localStorage.setItem('ghtc_lib_' + currentRepoName.toLowerCase(), JSON.stringify(library)); } catch (e) { }
}
function loadLibrary() {
  if (!currentRepoName) return;
  var libKey = 'ghtc_lib_' + currentRepoName.toLowerCase();
  var libData = localStorage.getItem(libKey);
  if (libData) {
    try { library = JSON.parse(libData); } catch (e2) { library = {}; }
  }
}

async function loadRepo() {
  const repoInput = input.value.trim().replace(/^https?:\/\/github\.com\//, '');
  const match = repoInput.match(/^([^/]+)\/([^/]+)/);
  if (!match) return showError('Enter a valid repo like owner/repo');
  const [, owner, repo] = match;
  showError(''); grid.innerHTML = ''; repoInfo.style.display = 'none';
  loading.style.display = 'block'; btn.disabled = true;
  try {
    const cacheKey = `${owner}/${repo}`.toLowerCase();
    const cachedContributors = await getCachedRepo(cacheKey);

    let valid, extraContributors, issueStats;

    if (cachedContributors) {
      setProgress('step-commits', 85, 'Loaded from cache (' + cachedContributors.length + ' contributors)');
      allContributors = cachedContributors;
      await sleep(300);
    } else {
      // Step 1: Fetch commit stats + paginated contributor list
      setProgress('step-commits', 5, 'Requesting contributor stats from GitHub...');
      let statsData = await fetchWithRetry(`https://api.github.com/repos/${owner}/${repo}/stats/contributors`);
      if (!Array.isArray(statsData)) statsData = [];
      const valid = statsData.filter(c => c.author && c.author.login && c.author.type !== 'Bot');
      setProgress('step-commits', 15, `Found ${valid.length} contributors via stats, fetching full list...`);

      // Fetch paginated contributors list (up to 10 pages = 1000 contributors)
      let extraContributors = [];
      try {
        extraContributors = await fetchPaginatedContributors(owner, repo, (count, page) => {
          setProgress('step-commits', Math.min(30, 15 + page * 2), `Fetching contributors... ${count} found (page ${page})`);
        });
      } catch (e2) { /* non-fatal */ }

      if (valid.length === 0 && extraContributors.length === 0) throw new Error('No contributor data. Try again in a moment.');
      setProgress('step-commits', 30, `Found ${Math.max(valid.length, extraContributors.length)} contributors`);

      // Step 2: Fetch issues & PRs
      setProgress('step-issues', 35, 'Fetching issues & pull requests...');
      let issueStats = {};
      try {
        issueStats = await fetchAllIssues(owner, repo, (count, page) => {
          const pct = Math.min(85, 35 + page * 3);
          setProgress('step-issues', pct, `Fetching issues & PRs... ${count} items (page ${page})`);
        });
      } catch (issueErr) {
        // Non-fatal: continue without issue data
        setProgress('step-issues', 85, 'Issue data unavailable (rate limited?) — using commits only');
        await sleep(1500);
      }

      // Step 3: Process
      setProgress('step-processing', 90, 'Crunching numbers and generating cards...');
      allContributors = processAllContributors(valid, issueStats, extraContributors);

      // Cache the processed result (much smaller than raw API data)
      setCachedRepo(cacheKey, allContributors);
    }
    setProgress('step-processing', 100, 'Done!');
    await sleep(300);

    library = {};
    repoLoaded = true;
    currentRepoName = `${owner}/${repo}`;
    loadLibrary();
    loading.style.display = 'none';
    searchContainer.style.display = 'none';
    history.replaceState(null, '', `?repo=${owner}/${repo}`);
    renderRepoInfo(owner, repo);
    renderLibrary();
  } catch (err) { console.error('[GHTC] loadRepo error:', err.message, err.stack); showError(err.message); loading.style.display = 'none'; }
  btn.disabled = false;
}

function renderRepoInfo(owner, repo) {
  repoInfo.style.display = 'block';
  const collected = Object.keys(library).length;
  const total = allContributors.length;
  repoInfo.innerHTML = `<div class="repo-info-inner">
      <h2><span>${owner || ''}</span> / <span>${repo || ''}</span></h2>
      <div class="repo-info-sep"></div>
      <div class="collection-progress"><span>${collected}</span> / <span>${total}</span> collected</div>
    </div>
    <div class="action-buttons">
      <button class="btn-secondary" onclick="openPack()" ${total === 0 ? 'disabled' : ''}>Open Pack</button>
    </div>
    <div class="filter-bar" id="filter-bar">
      <button class="filter-btn ${filterRarity==='all'?'active':''}" data-rarity="all" onclick="setFilter('all')">All</button>
      <button class="filter-btn ${filterRarity==='mythic'?'active':''}" data-rarity="mythic" onclick="setFilter('mythic')">Mythic</button>
      <button class="filter-btn ${filterRarity==='legendary'?'active':''}" data-rarity="legendary" onclick="setFilter('legendary')">Legendary</button>
      <button class="filter-btn ${filterRarity==='epic'?'active':''}" data-rarity="epic" onclick="setFilter('epic')">Epic</button>
      <button class="filter-btn ${filterRarity==='rare'?'active':''}" data-rarity="rare" onclick="setFilter('rare')">Rare</button>
      <button class="filter-btn ${filterRarity==='common'?'active':''}" data-rarity="common" onclick="setFilter('common')">Common</button>
      <div class="filter-sep"></div>
      <button class="filter-btn ${showMissing?'active':''}" style="${showMissing?'background:linear-gradient(135deg,#7873f5,#4adede);color:#fff':''}" onclick="toggleMissing()">Show Missing</button>
      <div class="filter-sep"></div>
      <input type="text" class="card-search" id="card-search" placeholder="Search cards..." value="${cardSearch}" />
      <div class="filter-sep"></div>
      <button class="filter-btn" onclick="fillLibrary()">Fill All</button>
      <button class="filter-btn" onclick="clearLibrary()">Clear All</button>
    </div>`;
  // Wire up search input
  const searchInput = document.getElementById('card-search');
  if (searchInput) {
    searchInput.addEventListener('input', e => { cardSearch = e.target.value; renderLibrary(); const el = document.getElementById('card-search'); if (el) { el.focus(); el.setSelectionRange(cardSearch.length, cardSearch.length); } });
  }
}

function setFilter(rarity) {
  filterRarity = rarity;
  renderRepoInfoFromCurrent();
  renderLibrary();
}


// ===== OPEN PACK =====
function openPack() {
  if (!allContributors.length) return;
  const picks = selectPackCards(5);
  const overlay = document.createElement('div');
  overlay.className = 'pack-overlay';
  overlay.innerHTML = `

}

function selectPackCards(count) {
  // Pull rates: ~1 legendary per 7 packs, weighted per slot
  const weights = { mythic: 1, legendary: 3, epic: 10, rare: 22, common: 64 };
  const byRarity = { mythic:[], legendary:[], epic:[], rare:[], common:[] };
  allContributors.forEach(c => byRarity[c.rarity].push(c));

  // Build weighted pool based on available rarities
  function rollRarity() {
    const available = {};
    let totalW = 0;
    for (const r of ['mythic','legendary','epic','rare','common']) {
      if (byRarity[r].length > 0) { available[r] = weights[r]; totalW += weights[r]; }
    }
    let roll = Math.random() * totalW;
    for (const [r, w] of Object.entries(available)) {
      roll -= w; if (roll <= 0) return r;
    }
    return 'common';
  }

  const picks = [];
  // Guarantee at least one rare+ card per pack
  const rareOrBetter = [...byRarity.rare, ...byRarity.epic, ...byRarity.legendary];
  if (rareOrBetter.length > 0) {
    // Roll rarity for guaranteed slot (rare+ only)
    const guarWeights = { mythic: 1, legendary: 3, epic: 10, rare: 86 };
    const guarAvail = {};
    let guarTotal = 0;
    for (const r of ['mythic','legendary','epic','rare']) {
      if (byRarity[r].length > 0) { guarAvail[r] = guarWeights[r]; guarTotal += guarWeights[r]; }
    }
    let roll = Math.random() * guarTotal;
    let guarRarity = 'rare';
    for (const [r, w] of Object.entries(guarAvail)) {
      roll -= w; if (roll <= 0) { guarRarity = r; break; }
    }
    const pool = byRarity[guarRarity];
    picks.push(pool[Math.floor(Math.random() * pool.length)]);
  }

  // Fill remaining slots with weighted random
  while (picks.length < count) {
    const rarity = rollRarity();
    const pool = byRarity[rarity];
    const c = pool[Math.floor(Math.random() * pool.length)];
    if (picks.includes(c) && picks.length < allContributors.length) continue;
    picks.push(c);
  }

  // Shuffle
  for (let i = picks.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [picks[i], picks[j]] = [picks[j], picks[i]];
  }
  return picks;
}

function revealCards(overlay, picks) {
  const area = overlay.querySelector('#reveal-area');
  area.style.display = 'flex';
  const rarityOrder = { common:0, rare:1, epic:2, legendary:3, mythic:4 };
  const sorted = [...picks].sort((a, b) => rarityOrder[a.rarity] - rarityOrder[b.rarity]);

  // Compute scale to fit gallery card (320x480) into reveal slot (190x293)
  const scaleX = 190 / 320, scaleY = 293 / 480;
  const cardScale = Math.min(scaleX, scaleY);

  sorted.forEach((c, i) => {
    const isNew = !library[c.login];
    const slot = document.createElement('div');
    slot.className = 'reveal-slot';
    slot.dataset.rarity = c.rarity;

    // Build the full gallery card HTML (same as library)
    const cardNum = allContributors.indexOf(c) + 1;
    const cardHTML = buildGalleryCard(c, cardNum, allContributors.length);

    slot.innerHTML = `
      <div class="rarity-glow"></div>
      <div class="reveal-card">
        <div class="reveal-card-back">
          <div class="reveal-card-back-logo">${GP_ICON}</div>
          <div class="reveal-card-back-repo"><span class="repo-owner">${currentRepoName.split('/')[0]}</span><span class="repo-name">${currentRepoName.split('/')[1] || ''}</span></div>
          <div class="reveal-card-back-brand">GitPacks</div>
        </div>
        <div class="reveal-card-front">
          <div class="card-wrapper" data-rarity="${c.rarity}" style="transform:scale(${cardScale});opacity:1">${cardHTML}</div>
        </div>
      </div>`;

    // Store metadata for animation and contributor data
    slot._isNew = isNew;
    slot._rarity = c.rarity;
    slot._contributor = c;
    area.appendChild(slot);
  });

  const slots = Array.from(area.querySelectorAll('.reveal-slot'));
  let flipped = 0;
  let revealComplete = false;

  // Mark all as unflipped and stagger entrance
  // Force a layout so the unflipped styles (back face visible) are computed before fading in
  slots.forEach(s => {
    s.classList.add('unflipped');
    s.style.opacity = '0';
    s.style.transform = 'translateY(30px)';
  });
  // Force reflow so unflipped styles are applied before we start the entrance animation
  area.offsetHeight;
  slots.forEach((s, i) => {
    setTimeout(() => { s.style.transition = 'opacity 0.4s ease, transform 0.4s ease'; s.style.opacity = '1'; s.style.transform = 'translateY(0)'; }, i * 100);
  });

  // Add instruction
  const flipInstruction = document.createElement('div');
  flipInstruction.className = 'pack-instruction';
  flipInstruction.textContent = 'Click a card or press Space';
  overlay.querySelector('.pack-container').appendChild(flipInstruction);

  function getNextUnflipped() {
    return slots.find(s => s.classList.contains('unflipped'));
  }

  function flipSlot(slot) {
    if (!slot || !slot.classList.contains('unflipped') || slot._flipping) return;
    slot._flipping = true;
    slot.classList.remove('unflipped');
    const rarity = slot._rarity;
    const card = slot.querySelector('.reveal-card');
    const isNew = slot._isNew;

    // Add rarity-specific flip class
    card.classList.add('flip-' + rarity);

    // Activate persistent rarity glow after flip animation
    const glowDelay = { common:400, rare:600, epic:800, legendary:1000, mythic:1400 }[rarity] || 400;
    setTimeout(() => {
      if (rarity !== 'common') slot.classList.add('revealed');
    }, glowDelay * 0.5);

    // Rarity-specific effects
    if (rarity === 'mythic') {
      // Double screen shake
      overlay.classList.add('shake-screen');
      setTimeout(() => { overlay.classList.remove('shake-screen'); setTimeout(() => overlay.classList.add('shake-screen'), 100); setTimeout(() => overlay.classList.remove('shake-screen'), 600); }, 500);
      // Massive screen flash
      const flash = document.createElement('div');
      flash.className = 'screen-flash mythic-screen';
      overlay.appendChild(flash);
      setTimeout(() => flash.remove(), 1500);
      // Triple rings + flash
      slot.insertAdjacentHTML('beforeend', '<div class="mythic-flash"></div><div class="mythic-ring"></div><div class="mythic-ring2"></div><div class="mythic-ring3"></div>');
      // Extra particles — more, bigger, red/orange/white
      let particles = '<div class="leg-particles">';
      const colors = ['#ff0040','#ff6600','#fff','#ff00ff','#ff0040','#fff','#ff6600'];
      for (let i = 0; i < 35; i++) {
        const angle = (Math.PI * 2 / 35) * i + (Math.random() - 0.5) * 0.5;
        const dist = 100 + Math.random() * 160;
        const px = Math.cos(angle) * dist;
        const py = Math.sin(angle) * dist;
        const dur = 0.8 + Math.random() * 0.8;
        const pdel = Math.random() * 0.3;
        const col = colors[Math.floor(Math.random() * colors.length)];
        const size = 4 + Math.random() * 7;
        particles += `<div class="leg-particle" style="width:${size}px;height:${size}px;background:${col};--px:${px}px;--py:${py}px;--pdur:${dur}s;--pdelay:${pdel}s"></div>`;
      }
      particles += '</div>';
      slot.insertAdjacentHTML('beforeend', particles);
    }
    else if (rarity === 'rare') {
      slot.insertAdjacentHTML('beforeend', '<div class="rare-flash"></div>');
    }
    else if (rarity === 'epic') {
      const flash = document.createElement('div');
      flash.className = 'screen-flash epic-screen';
      overlay.appendChild(flash);
      setTimeout(() => flash.remove(), 600);
      slot.insertAdjacentHTML('beforeend', '<div class="epic-flash"></div><div class="epic-ring"></div>');
    }
    else if (rarity === 'legendary') {
      overlay.classList.add('shake-screen');
      setTimeout(() => overlay.classList.remove('shake-screen'), 500);
      const flash = document.createElement('div');
      flash.className = 'screen-flash legendary-screen';
      overlay.appendChild(flash);
      setTimeout(() => flash.remove(), 1000);
      slot.insertAdjacentHTML('beforeend', '<div class="legendary-flash"></div><div class="legendary-ring"></div><div class="legendary-ring2"></div>');
      let particles = '<div class="leg-particles">';
      const colors = ['#ffd700','#ff6ec7','#fff','#ffd700','#ff9a56','#fff'];
      for (let i = 0; i < 20; i++) {
        const angle = (Math.PI * 2 / 20) * i + (Math.random() - 0.5) * 0.5;
        const dist = 80 + Math.random() * 120;
        const px = Math.cos(angle) * dist;
        const py = Math.sin(angle) * dist;
        const dur = 0.6 + Math.random() * 0.6;
        const pdel = Math.random() * 0.2;
        const col = colors[Math.floor(Math.random() * colors.length)];
        const size = 3 + Math.random() * 5;
        particles += `<div class="leg-particle" style="width:${size}px;height:${size}px;background:${col};--px:${px}px;--py:${py}px;--pdur:${dur}s;--pdelay:${pdel}s"></div>`;
      }
      particles += '</div>';
      slot.insertAdjacentHTML('beforeend', particles);
    }

    // NEW badge for new cards only
    if (isNew) {
      const badgeDelay = rarity === 'mythic' ? 1200 : rarity === 'legendary' ? 800 : rarity === 'epic' ? 500 : 300;
      setTimeout(() => {
        slot.insertAdjacentHTML('beforeend', `<div class="reveal-badge is-new">NEW</div>`);
      }, badgeDelay);
    }

    // Add to library (increment count)
    library[slot._contributor.login] = (library[slot._contributor.login] || 0) + 1;
    saveLibrary();

    flipped++;

    // Check completion after animation settles
    setTimeout(() => {
      // All cards flipped?
      if (flipped >= slots.length && !revealComplete) {
        revealComplete = true;
        flipInstruction.remove();
        document.removeEventListener('keydown', spaceHandler);

        // Enable hover + click-to-fullscreen
        slots.forEach(s => {
          s.classList.add('hoverable');
          s.addEventListener('click', () => {
            const c = s._contributor;
            if (c) openFullscreenCard(c);
          });
        });

        function openAnother() { overlay.remove(); document.removeEventListener('keydown', doneSpaceHandler); document.removeEventListener('keydown', overlay._escHandler); renderRepoInfoFromCurrent(); renderLibrary(); openPack(); }

        // Space to open another pack
        const doneSpaceHandler = e => { if (e.code === 'Space') { e.preventDefault(); openAnother(); } };
        document.addEventListener('keydown', doneSpaceHandler);

        // Show action buttons
        const btnWrap = document.createElement('div');
        btnWrap.className = 'reveal-buttons';
        const doneBtn = document.createElement('button');
        doneBtn.className = 'reveal-done-btn';
        doneBtn.textContent = 'View Library';
        doneBtn.onclick = () => { overlay.remove(); document.removeEventListener('keydown', doneSpaceHandler); document.removeEventListener('keydown', overlay._escHandler); renderRepoInfoFromCurrent(); renderLibrary(); };
        const anotherBtn = document.createElement('button');
        anotherBtn.className = 'reveal-another-btn';
        anotherBtn.textContent = 'Open Another';
        anotherBtn.onclick = openAnother;
        btnWrap.appendChild(doneBtn);
        btnWrap.appendChild(anotherBtn);
        overlay.querySelector('.pack-container').appendChild(btnWrap);
      }
    }, glowDelay);
  }

  // Click a card to flip that specific card
  slots.forEach(slot => {
    slot.addEventListener('click', () => {
      if (slot.classList.contains('unflipped')) flipSlot(slot);
    });
  });

  // Spacebar flips all remaining cards one at a time
  let spaceQueued = false;
  const spaceHandler = e => {
    if (e.code === 'Space' && flipped < slots.length && !spaceQueued) {
      e.preventDefault();
      spaceQueued = true;
      function flipAll() {
        const next = getNextUnflipped();
        if (!next) { spaceQueued = false; return; }
        flipSlot(next);
        setTimeout(flipAll, 150);
      }
      flipAll();
    }
  };
  document.addEventListener('keydown', spaceHandler);
}

// ===== RENDER LIBRARY =====
function renderLibrary() {
  grid.innerHTML = '';
  if (!repoLoaded) return;
  const allCollected = allContributors.filter(c => library[c.login]);
  if (allCollected.length === 0 && !showMissing) {
    grid.innerHTML = `<div class="empty-library">
      <div class="empty-icon">${GP_ICON}</div>
      <p>Open a pack to start collecting!</p>
    </div>`;
    return;
  }

  // Build display list: collected + optionally missing
  let pool = showMissing ? [...allContributors] : [...allCollected];
  if (filterRarity !== 'all') pool = pool.filter(c => c.rarity === filterRarity);
  if (cardSearch) { const q = cardSearch.toLowerCase(); pool = pool.filter(c => c.login.toLowerCase().includes(q) || (c.title && c.title.toLowerCase().includes(q))); }

  pool.sort((a, b) => b.power - a.power);

  if (pool.length === 0) {
    grid.innerHTML = `<div class="empty-library"><p>No cards match filters</p></div>`;
    return;
  }

  const totalCards = allContributors.length;
  // Create lightweight placeholders — real card HTML is built lazily on scroll
  pool.forEach((c, i) => {
    const owned = !!library[c.login];
    const w = document.createElement('div');
    w.className = owned ? 'card-wrapper clickable' : 'card-wrapper ghost-card';
    w.dataset.rarity = c.rarity;
    w._cardData = c;
    w._owned = owned;
    w._cardNum = allContributors.indexOf(c) + 1;
    w._totalCards = totalCards;
    w.addEventListener('click', () => openFullscreenCard(c));
    grid.appendChild(w);
  });

  // Event delegation for mousemove — one listener instead of 400
  grid.addEventListener('mousemove', e => {
    const card = e.target.closest('.card');
    if (!card || card._lastMove && Date.now() - card._lastMove < 16) return;
    card._lastMove = Date.now();
    const r = card.getBoundingClientRect();
    const x = (e.clientX - r.left) / r.width - 0.5;
    const y = (e.clientY - r.top) / r.height - 0.5;
    card.style.transform = `rotateY(${x * 18}deg) rotateX(${-y * 18}deg) scale(1.04)`;
    const shine = card.querySelector('.card-shine');
    if (shine) shine.style.background = `radial-gradient(circle at ${(x+.5)*100}% ${(y+.5)*100}%, rgba(255,255,255,0.15) 0%, transparent 60%)`;
  });
  grid.addEventListener('mouseleave', e => {
    const card = e.target.closest('.card');
    if (card) card.style.transform = '';
  }, true);

  // Lazy render + pause offscreen animations via IntersectionObserver
  if (window._cardObserver) window._cardObserver.disconnect();
  window._cardObserver = new IntersectionObserver(entries => {
    entries.forEach(e => {
      const w = e.target;
      if (e.isIntersecting) {
        // Lazy-render card HTML on first appearance
        if (!w._rendered) {
          w._rendered = true;
          w.innerHTML = buildGalleryCard(w._cardData, w._cardNum, w._totalCards);
          if (w._owned) {
            const qty = library[w._cardData.login] || 1;
            if (qty > 1) w.insertAdjacentHTML('beforeend', `<div class="card-qty">x${qty}</div>`);
          }
        }
        w.classList.remove('offscreen');
      } else {
        w.classList.add('offscreen');
      }
    });
  }, { rootMargin: '400px' });
  grid.querySelectorAll('.card-wrapper').forEach(w => window._cardObserver.observe(w));
}
