// ===== HELPERS =====
async function fetchWithRetry(url) {
  const headers = ghToken ? { Authorization: `token ${ghToken}` } : {};
  const maxAttempts = 10;
  for (let i = 0; i < maxAttempts; i++) {
    const res = await fetch(url, { headers });
    if (res.status === 202) {
      const msgs = ['Requesting contributor stats...', 'GitHub is crunching the numbers...', 'Still computing stats...', 'Almost there...'];
      setProgress('step-commits', 5 + i * 2, msgs[Math.min(i, msgs.length - 1)]);
      await sleep(3000 + i * 1000);
      continue;
    }
    if (!res.ok) throw new Error(`GitHub API error: ${res.status}`);
    return res.json();
  }
  throw new Error('GitHub is still computing stats for this repo. Please try again in a minute.');
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function showError(m) { errorEl.textContent = m; errorEl.style.display = m ? 'block' : 'none'; }

async function fetchAllIssues(owner, repo, onProgress) {
  const headers = ghToken ? { Authorization: `token ${ghToken}` } : {};
  const ensure = (stats, login, avatar) => { if (!stats[login]) stats[login] = { prsMerged: 0, issues: 0, avatar: avatar || '' }; else if (avatar && !stats[login].avatar) stats[login].avatar = avatar; };
  const stats = {};

  // Fetch issues endpoint (gives us issues + PR authorship + merged_at)
  let page = 1;
  while (true) {
    const url = `https://api.github.com/repos/${owner}/${repo}/issues?state=all&per_page=100&page=${page}`;
    const res = await fetch(url, { headers });
    if (res.status === 403 || res.status === 429) {
      if (page === 1) throw new Error('Rate limited fetching issues. Add a GitHub token for higher limits.');
      break;
    }
    if (!res.ok) break;
    const data = await res.json();
    if (!data.length) break;
    data.forEach(item => {
      if (!item.user || !item.user.login) return;
      const login = item.user.login;
      ensure(stats, login, item.user.avatar_url);
      if (item.pull_request) {
        if (item.pull_request.merged_at) stats[login].prsMerged++;
      } else {
        stats[login].issues++;
      }
    });
    const totalItems = Object.values(stats).reduce((s, v) => s + v.prsMerged + v.issues, 0);
    onProgress(totalItems, page);
    page++;
    if (page > 200) break;
  }

  return stats;
}

async function fetchPaginatedContributors(owner, repo, onProgress) {
  const headers = ghToken ? { Authorization: `token ${ghToken}` } : {};
  const all = [];
  for (let page = 1; page <= 10; page++) {
    const url = `https://api.github.com/repos/${owner}/${repo}/contributors?per_page=100&page=${page}`;
    const res = await fetch(url, { headers });
    if (!res.ok) break;
    const data = await res.json();
    if (!data.length) break;
    data.forEach(c => {
      if (c.login && c.type !== 'Bot') {
        all.push({ login: c.login, avatar: c.avatar_url, contributions: c.contributions });
      }
    });
    onProgress(all.length, page);
  }
  return all;
}

// ===== PROCESS CONTRIBUTORS =====
function processAllContributors(all, issueStats, extraContributors) {
  issueStats = issueStats || {};
  extraContributors = extraContributors || [];
  const hasIssueData = Object.keys(issueStats).length > 0;
  const maxC = Math.max(...all.map(x => x.total), 1);
  const sorted = all.map(x => x.total).sort((a, b) => b - a);

  // First pass: compute raw stats for everyone
  const rawEntries = all.map(c => {
    const weeks = c.weeks || [], totalCommits = c.total;
    let activeWeeks = 0, curStreak = 0, maxStreak = 0, streakOn = false, peak = 0, recent = 0, firstCommitTs = Infinity;
    const recentWindow = Math.min(52, Math.ceil(weeks.length / 2));
    const recTh = weeks.length - recentWindow;
    const inactiveWindow = Math.max(52, Math.ceil(weeks.length / 3));
    const inactiveTh = weeks.length - inactiveWindow;
    let inactiveRecent = 0;
    weeks.forEach((w, i) => {
      if (w.c > 0) { activeWeeks++; if (streakOn) curStreak++; else { curStreak = 1; streakOn = true; } maxStreak = Math.max(maxStreak, curStreak); peak = Math.max(peak, w.c); if (w.w < firstCommitTs) firstCommitTs = w.w; }
      else { streakOn = false; curStreak = 0; }
      if (i >= recTh) recent += w.c;
      if (i >= inactiveTh) inactiveRecent += w.c;
    });
    const share = maxC > 0 ? totalCommits / maxC : 0;
    const consistency = activeWeeks / Math.max(weeks.length, 1);
    const recentShare = totalCommits > 0 ? recent / totalCommits : 0;
    const is = issueStats[c.author.login] || { prsMerged: 0, issues: 0 };
    return {
      login: c.author.login, avatar: c.author.avatar_url,
      commits: totalCommits, activeWeeks, totalWeeks: weeks.length,
      maxStreak, peak, recent, share, consistency, recentShare,
      firstCommitTs, inactive: inactiveRecent === 0,
      prsMerged: is.prsMerged, issues: is.issues,
    };
  });

  // Add contributors from paginated endpoint that aren't in stats
  const statsLogins = new Set(rawEntries.map(e => e.login));
  extraContributors.forEach(ec => {
    if (statsLogins.has(ec.login)) return;
    const is = issueStats[ec.login] || { prsOpened: 0, prsMerged: 0, issues: 0, avatar: '' };
    rawEntries.push({
      login: ec.login, avatar: ec.avatar || is.avatar || '',
      commits: ec.contributions || 0, activeWeeks: 0, totalWeeks: 0,
      maxStreak: 0, peak: 0, recent: 0, share: 0, consistency: 0, recentShare: 0,
      firstCommitTs: Infinity, inactive: false,
      prsMerged: is.prsMerged, issues: is.issues,
    });
    statsLogins.add(ec.login);
  });

  // Add issue/PR-only contributors (no commits, not in stats or paginated list)
  if (hasIssueData) {
    Object.entries(issueStats).forEach(([login, is]) => {
      if (statsLogins.has(login)) return;
      if (is.prsMerged === 0 && is.issues === 0) return;
      rawEntries.push({
        login, avatar: is.avatar || '',
        commits: 0, activeWeeks: 0, totalWeeks: 0,
        maxStreak: 0, peak: 0, recent: 0, share: 0, consistency: 0, recentShare: 0,
        firstCommitTs: Infinity, inactive: false,
        prsMerged: is.prsMerged, issues: is.issues,
      });
    });
  }

  // Cap at 1000 contributors — keep highest activity
  if (rawEntries.length > 500) {
    rawEntries.sort((a, b) => (b.commits + b.prsMerged + b.issues) - (a.commits + a.prsMerged + a.issues));
    rawEntries.length = 500;
  }

  // Build percentile rank function: returns 0-1 where 1 = best in repo
  function pctRank(arr) {
    const s = [...arr].sort((a, b) => a - b);
    const n = s.length;
    return val => {
      let below = 0;
      for (let i = 0; i < n; i++) { if (s[i] < val) below++; else break; }
      return n > 1 ? below / (n - 1) : (val > 0 ? 1 : 0);
    };
  }
  const ranks = {
    commits: pctRank(rawEntries.map(e => e.commits)),
    streak: pctRank(rawEntries.map(e => e.maxStreak)),
    activeWeeks: pctRank(rawEntries.map(e => e.activeWeeks)),
    peak: pctRank(rawEntries.map(e => e.peak)),
    recent: pctRank(rawEntries.map(e => e.recent)),
    consistency: pctRank(rawEntries.map(e => e.consistency)),
    prsMerged: pctRank(rawEntries.map(e => e.prsMerged)),
    issues: pctRank(rawEntries.map(e => e.issues)),
  };

  // Raw maxes for log-scaled power calculation
  const mx = {
    streak: Math.max(...rawEntries.map(e => e.maxStreak), 1),
    peak: Math.max(...rawEntries.map(e => e.peak), 1),
    prsMerged: Math.max(...rawEntries.map(e => e.prsMerged), 1),
    issues: Math.max(...rawEntries.map(e => e.issues), 1),
  };

  // Find the first person to ever commit to the repo
  const earliestTs = Math.min(...rawEntries.map(e => e.firstCommitTs));

  // Power weights — shift weight to PRs/issues when data is available
  const W = hasIssueData
    ? { commits: 28, prs: 14, issues: 8, consistency: 22, streak: 16, peak: 12 }
    : { commits: 45, prs: 0, issues: 0, consistency: 25, streak: 18, peak: 12 };

  // First pass: compute percentile scores and raw blended power
  const preEntries = rawEntries.map(c => {
    const pctScores = {
      commits: ranks.commits(c.commits),
      streak: ranks.streak(c.maxStreak),
      activeWeeks: ranks.activeWeeks(c.activeWeeks),
      peak: ranks.peak(c.peak),
      recent: ranks.recent(c.recent),
      consistency: ranks.consistency(c.consistency),
      prsMerged: ranks.prsMerged(c.prsMerged),
      issues: ranks.issues(c.issues),
    };

    // Blend percentile rank (fair distribution) with log-scaled actual values (rewards real output)
    const logCommits = maxC > 1 ? Math.log(c.commits + 1) / Math.log(maxC + 1) : 0;
    const logStreak = mx.streak > 1 ? Math.log(c.maxStreak + 1) / Math.log(mx.streak + 1) : 0;
    const logPeak = mx.peak > 1 ? Math.log(c.peak + 1) / Math.log(mx.peak + 1) : 0;
    const logPrsMerged = mx.prsMerged > 1 ? Math.log(c.prsMerged + 1) / Math.log(mx.prsMerged + 1) : 0;
    const logIssues = mx.issues > 1 ? Math.log(c.issues + 1) / Math.log(mx.issues + 1) : 0;

    const pctPower = pctScores.commits * W.commits + pctScores.prsMerged * W.prs + pctScores.issues * W.issues + pctScores.consistency * W.consistency + pctScores.streak * W.streak + pctScores.peak * W.peak;
    const rawPower = logCommits * W.commits + logPrsMerged * W.prs + logIssues * W.issues + c.consistency * W.consistency + logStreak * W.streak + logPeak * W.peak;
    const blended = (pctPower + rawPower) / 2;

    return { ...c, blended, pctScores };
  });

  // Second pass: normalize power so top = 99, then assign rarity from power rank
  const maxBlended = Math.max(...preEntries.map(e => e.blended), 1);
  const withPower = preEntries.map(e => {
    const power = Math.max(1, Math.round((e.blended / maxBlended) * 99));
    const { blended, ...rest } = e;
    return { ...rest, power };
  });

  // Sort by power descending to assign rarity by rank
  const byPower = [...withPower].sort((a, b) => b.power - a.power);
  const n = byPower.length;
  byPower.forEach((e, i) => {
    const pct = i / Math.max(n - 1, 1);
    // Mythic: 1 per 100 contributors, only if 100+ exist
    const mythicSlots = Math.floor(n / 100);
    if (mythicSlots > 0 && i < mythicSlots) e.rarity = 'mythic';
    else if (pct <= 0.05) e.rarity = 'legendary';
    else if (pct <= 0.15) e.rarity = 'epic';
    else if (pct <= 0.43) e.rarity = 'rare';
    else e.rarity = 'common';
  });

  // Third pass: assign titles, abilities, and dominant stat (now that rarity is known)
  const entries = withPower.map(c => {
    const isFirstCommitter = c.firstCommitTs === earliestTs;
    const rarity = c.rarity;
    const title = getTitle(c, c.pctScores, isFirstCommitter, rarity);
    const ability = getAbility(c, c.pctScores, isFirstCommitter, rarity);

    let dominantStat = null;
    const hasActivity = c.commits > 1 || c.prsMerged > 0 || c.issues > 0;
    if (!isFirstCommitter && !c.inactive && hasActivity) {
      const dom = (rarity === 'mythic' || rarity === 'legendary' || rarity === 'epic') ? getBestStat(c.pctScores) : getBestCharacteristic(c.pctScores);
      dominantStat = dom === 'balanced' ? null : dom;
    }

    return { ...c, title, ability, dominantStat };
  });

  return entries.sort((a, b) => b.power - a.power);
}

// Find best characteristic including recent, prs, issues (for titles)
function getBestCharacteristic(p) {
  const stats = [
    { key:'streak', val:p.streak },
    { key:'consistency', val:p.consistency },
    { key:'peak', val:p.peak },
    { key:'recent', val:p.recent },
    { key:'prs', val:p.prsMerged },
    { key:'issues', val:p.issues },
  ];
  const best = stats.reduce((a, b) => b.val > a.val ? b : a);
  const avg = stats.reduce((s, x) => s + x.val, 0) / stats.length;
  if (best.val < avg + 0.08) return 'balanced';
  return best.key;
}

// Find best stat for abilities
function getBestStat(p) {
  const stats = [
    { key:'streak', val:p.streak },
    { key:'consistency', val:p.consistency },
    { key:'peak', val:p.peak },
    { key:'prs', val:p.prsMerged },
    { key:'issues', val:p.issues },
  ];
  return stats.reduce((a, b) => b.val > a.val ? b : a).key;
}

// ===== TITLES — Rarity-driven, stat-flavored =====
function getTitle(c, p, isFirstCommitter, rarity) {
  if (isFirstCommitter) {
    return { mythic:'Supreme Leader', legendary:'Founding Flame', epic:'First Flame', rare:'Pioneer', common:'Trailblazer' }[rarity] || 'Founding Flame';
  }

  // Inactive
  if (c.inactive) {
    return { mythic:'Eternal Legend', legendary:'Legacy Guardian', epic:'Phantom', rare:'Dormant', common:'Time Capsule' }[rarity];
  }

  // Very low activity — but skip if they have meaningful PR/issue contributions
  const hasNonCommitActivity = c.prsMerged > 0 || c.issues > 0;
  if (c.commits <= 1 && !hasNonCommitActivity) return 'Newcomer';
  if (c.commits > 1 && p.commits < 0.15 && !hasNonCommitActivity) return 'Explorer';

  // Legendary/epic: pick from streak/consistency/peak only (they've outgrown "recent")
  // Rare/common: include recent as a possible identity
  const dom = (rarity === 'mythic' || rarity === 'legendary' || rarity === 'epic')
    ? getBestStat(p)
    : getBestCharacteristic(p);

  const titles = {
    streak:      { mythic:'Unstoppable Force',  legendary:'Relentless Force', epic:'Streak Demon',     rare:'Hot Streak',  common:'Tenacious' },
    consistency: { mythic:'The Immortal',       legendary:'The Eternal',      epic:'Juggernaut',       rare:'Ironclad',    common:'Clockwork' },
    peak:        { mythic:'Cataclysm',          legendary:'Supernova',        epic:'Lightning Strike', rare:'Blitz',       common:'Spark' },
    recent:      { rare:'Rising Star', common:'Recent Contributor' },
    prs:         { mythic:'The Unbound',     legendary:'PR Overlord',      epic:'PR Titan',     rare:'PR Machine',  common:'Pull Requester' },
    issues:      { mythic:'The Oracle',         legendary:'The Seer',         epic:'Issue Hunter',     rare:'Bug Spotter', common:'Reporter' },
    balanced:    { mythic:'Transcendent',       legendary:'Mastermind',        epic:'Titan',           rare:'Veteran',     common:'Contributor' },
  };

  return titles[dom]?.[rarity] || titles.balanced[rarity];
}

// ===== ABILITIES — Rarity-scaled, based on best stat =====
function getAbility(c, p, isFirstCommitter, rarity) {
  if (isFirstCommitter) return {
    mythic:    { name:'Primordial Force', desc:'The commit that forged a project from nothing', icon:'👑', color:'#ff0040' },
    legendary: { name:'First Spark', desc:'There from the very beginning', icon:'🔥', color:'#ffd700' },
    epic:      { name:'Trailblazer', desc:'Wrote the code that started it all', icon:'🔥', color:'#f59e0b' },
    rare:      { name:'Groundbreaker', desc:'Among the very first contributors', icon:'⭐', color:'#60a5fa' },
    common:    { name:'Early Bird', desc:'One of the original contributors', icon:'🌱', color:'#888' },
  }[rarity];

  // Inactive — tiered by rarity
  if (c.inactive) {
    return {
      mythic:    { name:'Eternal Flame', desc:`${fmt(c.commits)} commits forged the foundation`, icon:'🏛️', color:'#ff0040' },
      legendary: { name:'Immortalized', desc:`${fmt(c.commits)} commits still shaping this project`, icon:'🪦', color:'#c084fc' },
      epic:      { name:'Ghost in the Code', desc:`${fmt(c.commits)} commits, then vanished`, icon:'👻', color:'#94a3b8' },
      rare:      { name:'Echo', desc:'Past contributions still resonate', icon:'🔊', color:'#60a5fa' },
      common:    { name:'Faded', desc:'Contributions from another time', icon:'☁️', color:'#666' },
    }[rarity];
  }

  // Very low activity — but skip if they have meaningful PR/issue contributions
  const hasNonCommitActivity = c.prsMerged > 0 || c.issues > 0;
  if (c.commits <= 1 && !hasNonCommitActivity) return { name:'Debut', desc:'One commit — the journey begins', icon:'💎', color:'#888' };
  if (c.commits > 1 && p.commits < 0.15 && !hasNonCommitActivity) return { name:'First Steps', desc:`${c.commits} commits so far`, icon:'👣', color:'#999' };

  const best = getBestStat(p);

  if (best === 'streak') return {
    mythic:    { name:'Infinite Chain', desc:`${c.maxStreak} weeks — the streak that never dies`, icon:'🔥', color:'#ff0040' },
    legendary: { name:'Undying Flame',  desc:`${c.maxStreak} weeks without stopping`, icon:'⚡', color:'#ffd700' },
    epic:      { name:'Unbreakable', desc:`${c.maxStreak}-week streak — iron will`, icon:'⚡', color:'#4ade80' },
    rare:      { name:'On a Roll',   desc:`${c.maxStreak}-week streak`, icon:'🎲', color:'#60a5fa' },
    common:    { name:'Persistent',  desc:`${c.maxStreak}-week best streak`, icon:'✨', color:'#7dd3fc' },
  }[rarity];

  if (best === 'consistency') return {
    mythic:    { name:'Eternal Engine', desc:`${c.activeWeeks} of ${c.totalWeeks} weeks — never stops`, icon:'♾️', color:'#ff0040' },
    legendary: { name:'Perpetual Motion', desc:`Active ${c.activeWeeks} of ${c.totalWeeks} weeks`, icon:'♾️', color:'#a78bfa' },
    epic:      { name:'Iron Rhythm', desc:`${c.activeWeeks} of ${c.totalWeeks} weeks active`, icon:'🔥', color:'#f59e0b' },
    rare:      { name:'Metronome',        desc:`Reliable across ${c.activeWeeks} weeks`, icon:'🔄', color:'#60a5fa' },
    common:    { name:'Steady Pulse',     desc:`Active for ${c.activeWeeks} weeks`, icon:'💙', color:'#60a5fa' },
  }[rarity];

  if (best === 'peak') return {
    mythic:    { name:'Extinction Event', desc:`${c.peak} commits in one week — off the charts`, icon:'☄️', color:'#ff0040' },
    legendary: { name:'Hyperdrive',   desc:`${c.peak} commits in a single week`, icon:'🚀', color:'#ff6ec7' },
    epic:      { name:'Burst Mode',   desc:`${c.peak} in one week — devastating`, icon:'💫', color:'#60a5fa' },
    rare:      { name:'Quick Strike', desc:`Peaked at ${c.peak} in a week`, icon:'⚔️', color:'#fb923c' },
    common:    { name:'Flash',        desc:`${c.peak} in their best week`, icon:'🔸', color:'#fb923c' },
  }[rarity];

  if (best === 'prs') return {
    mythic:    { name:'Reality Warp', desc:`${fmt(c.prsMerged)} PRs merged — the code bends to their will`, icon:'🌀', color:'#ff0040' },
    legendary: { name:'Merge Overlord', desc:`${fmt(c.prsMerged)} PRs merged — shapes the codebase`, icon:'🔀', color:'#4ade80' },
    epic:      { name:'PR Juggernaut',  desc:`${fmt(c.prsMerged)} pull requests merged`, icon:'🔀', color:'#4ade80' },
    rare:      { name:'Code Courier',   desc:`${fmt(c.prsMerged)} PRs delivered`, icon:'📬', color:'#34d399' },
    common:    { name:'PR Contributor', desc:`${fmt(c.prsMerged)} pull requests merged`, icon:'📝', color:'#6ee7b7' },
  }[rarity];

  if (best === 'issues') return {
    mythic:    { name:'All-Seeing Eye', desc:`${fmt(c.issues)} issues — nothing escapes their gaze`, icon:'🔮', color:'#ff0040' },
    legendary: { name:'Visionary',     desc:`${fmt(c.issues)} issues — sees what others miss`, icon:'🔍', color:'#f472b6' },
    epic:      { name:'Issue Magnet',  desc:`${fmt(c.issues)} issues surfaced`, icon:'🎯', color:'#fb7185' },
    rare:      { name:'Scout',         desc:`${fmt(c.issues)} issues reported`, icon:'🔎', color:'#f9a8d4' },
    common:    { name:'Watchful Eye',  desc:`${fmt(c.issues)} issues filed`, icon:'👁️', color:'#fda4af' },
  }[rarity];

  // Fallback (shouldn't hit)
  return { name:'Contributor', desc:`${fmt(c.commits)} commits`, icon:'🔧', color:'#999' };
}

// ===== FULLSCREEN CARD VIEW =====
function openFullscreenCard(c) {
  const overlay = document.createElement('div');
  const isGhost = !library[c.login];
  overlay.className = 'fullscreen-overlay' + (isGhost ? ' fullscreen-ghost' : '');
  const cardNum = allContributors.indexOf(c) + 1;
  const cardHTML = buildGalleryCard(c, cardNum, allContributors.length);

  const closeOverlay = () => { overlay.remove(); document.removeEventListener('keydown', escHandler); };
  const escHandler = e => { if (e.key === 'Escape') closeOverlay(); };

  const weeksSinceFirst = (c.firstCommitTs && isFinite(c.firstCommitTs)) ? Math.round((Date.now() / 1000 - c.firstCommitTs) / 604800) : 0;
  const pct = c.pctScores || {};
  const rc = rarityColor(c.rarity);

  const dom = c.dominantStat;
  function statRow(label, value, pctVal, color, highlight) {
    const p = Math.round((pctVal || 0) * 100);
    const hl = highlight ? ' fs-highlight' : '';
    const topPct = Math.max(1, Math.ceil(100 - (pctVal || 0) * 100));
    const pctLabel = topPct > 80 ? 'Bottom 20%' : `Top ${topPct}%`;
    const bar = pctVal != null ? `<div class="fs-pct-inline"><div class="fs-pct-track"><div class="fs-pct-fill" style="width:${p}%;background:${color}"></div></div><span class="fs-pct-val"${highlight ? ` style="color:${color}"` : ''}>${pctLabel}</span></div>` : '';
    return `<div class="fs-stat-row${hl}"${highlight ? ` style="border-bottom-color:${color}30;border-left-color:${color}"` : ''}><div class="fs-stat-top"><span class="fs-stat-label"${highlight ? ` style="color:${color}"` : ''}>${label}</span><span class="fs-stat-value">${value}</span></div>${bar}</div>`;
  }

  overlay.innerHTML = `
    <div class="fullscreen-layout">
      <div class="fullscreen-close">CLOSE</div>
      <div class="fullscreen-card-container">
        <div class="card-wrapper" data-rarity="${c.rarity}" style="opacity:1;animation:none">${cardHTML}</div>
      </div>
      <div class="fullscreen-stats-panel">
        <h3>Details</h3>
        ${statRow('Total Commits', fmt(c.commits) + ' commits', pct.commits, rc, false)}
        ${statRow('PRs Merged', fmt(c.prsMerged) + ' PRs', pct.prsMerged, '#4ade80', dom === 'prs')}
        ${statRow('Issues', fmt(c.issues) + ' issues', pct.issues, '#f472b6', dom === 'issues')}
        ${statRow('Active Weeks', `${c.activeWeeks} <span class="fs-stat-pct">/ ${c.totalWeeks}</span> weeks`, pct.activeWeeks, '#4adede', dom === 'consistency')}
        ${statRow('Best Streak', c.maxStreak + ' weeks', pct.streak, '#facc15', dom === 'streak')}
        ${statRow('Peak Week', c.peak + ' commits', pct.peak, '#c084fc', dom === 'peak')}

        ${statRow('Tenure', weeksSinceFirst < 52 ? weeksSinceFirst + 'w' : Math.round(weeksSinceFirst / 52 * 10) / 10 + 'y', null, null)}
        ${statRow('Owned', (library[c.login] || 0) + 'x', null, null)}
      </div>
    </div>
    <a class="fullscreen-profile" href="https://github.com/${c.login}" target="_blank" rel="noopener">${GH_ICON} View Profile</a>`;
  document.body.appendChild(overlay);

  // 3D tilt on mousemove — only on the card itself
  const container = overlay.querySelector('.fullscreen-card-container');
  const cardWrapper = container.querySelector('.card-wrapper');
  const card = container.querySelector('.card');
  cardWrapper.addEventListener('mousemove', e => {
    const r = cardWrapper.getBoundingClientRect();
    const x = (e.clientX - r.left) / r.width - 0.5;
    const y = (e.clientY - r.top) / r.height - 0.5;
    card.style.transform = `rotateY(${x * 20}deg) rotateX(${-y * 20}deg)`;
    const shine = card.querySelector('.card-shine');
    if (shine) shine.style.background = `radial-gradient(circle at ${(x+.5)*100}% ${(y+.5)*100}%, rgba(255,255,255,0.18) 0%, transparent 60%)`;
    if (shine) shine.style.opacity = '1';
  });
  cardWrapper.addEventListener('mouseleave', () => {
    card.style.transform = '';
    const shine = card.querySelector('.card-shine');
    if (shine) shine.style.opacity = '0';
  });

  // Close button
  overlay.querySelector('.fullscreen-close').addEventListener('click', e => { e.stopPropagation(); closeOverlay(); });

  // Close on click outside card or ESC
  overlay.addEventListener('click', e => { if (e.target === overlay) closeOverlay(); });
  document.addEventListener('keydown', escHandler);

  // Prevent card/stats/profile click from closing overlay
  overlay.querySelector('.fullscreen-layout').addEventListener('click', e => e.stopPropagation());
  overlay.querySelector('.fullscreen-profile').addEventListener('click', e => e.stopPropagation());
}

function fmt(n) { if (n >= 1e6) return (n/1e6).toFixed(1)+'M'; if (n >= 1e3) return (n/1e3).toFixed(1)+'K'; return n.toString(); }
function rarityColor(r) { return {mythic:'#ff0040',legendary:'#ffd700',epic:'#c084fc',rare:'#60a5fa',common:'#888'}[r]||'#888'; }
function powerGrad(r) { return {mythic:'linear-gradient(90deg,#ff0040,#ff6600,#ff00ff)',legendary:'linear-gradient(90deg,#ffd700,#ff6ec7)',epic:'linear-gradient(90deg,#a855f7,#6366f1)',rare:'linear-gradient(90deg,#3b82f6,#06b6d4)',common:'linear-gradient(90deg,#555,#777)'}[r]||'linear-gradient(90deg,#555,#777)'; }

function buildGalleryCard(c, idx, total) {
  const rc = rarityColor(c.rarity);
  let sparklesHTML = '';
  if (c.rarity === 'mythic' || c.rarity === 'legendary' || c.rarity === 'epic') {
    const count = c.rarity === 'mythic' ? 24 : c.rarity === 'legendary' ? 16 : 8;
    sparklesHTML = '<div class="card-sparkles">';
    for (let i = 0; i < count; i++) {
      sparklesHTML += `<div class="sparkle" style="left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${1.5+Math.random()*2}s;--delay:${Math.random()*3}s"></div>`;
    }
    sparklesHTML += '</div>';
  }

  const statsHTML = `
      <div class="stat-box"><div class="stat-value" style="color:${rc}">${fmt(c.commits)}</div><div class="stat-label">Commits</div></div>
      <div class="stat-box"><div class="stat-value" style="color:#4ade80">${fmt(c.prsMerged)}</div><div class="stat-label">PRs Merged</div></div>
      <div class="stat-box"><div class="stat-value" style="color:#f472b6">${fmt(c.issues)}</div><div class="stat-label">Issues</div></div>
      <div class="stat-box"><div class="stat-value" style="color:#4adede">${c.activeWeeks}</div><div class="stat-label">Active Wks</div></div>
      <div class="stat-box"><div class="stat-value" style="color:#c084fc">${c.peak}</div><div class="stat-label">Peak Week</div></div>
      <div class="stat-box"><div class="stat-value" style="color:#facc15">${c.maxStreak}w</div><div class="stat-label">Streak</div></div>`;

  return `<div class="card" data-rarity="${c.rarity}"><div class="card-inner"><div class="card-shine"></div><div class="card-holo"></div><div class="card-rainbow"></div>${sparklesHTML}
    <div class="card-header-repo">${currentRepoName}</div>
    <div class="card-top"><div class="card-top-bg"><img src="${c.avatar}" alt="" loading="lazy"/></div><div class="card-top-overlay"></div>
    <div class="title-chip" style="color:${rc}">${c.title}</div>
    <div class="rarity-badge ${c.rarity}">${c.rarity}</div>
    <div class="avatar-container"><div class="avatar-ring"><img src="${c.avatar}" alt="${c.login}" loading="lazy"/></div></div></div>
    <div class="card-body"><div class="card-name">${c.login}</div>
    <div class="card-title">${c.title}</div>
    <div class="power-bar"><span class="power-label">PWR</span><div class="power-track"><div class="power-fill" style="width:${c.power}%;background:${powerGrad(c.rarity)}"></div></div><span class="power-value" style="color:${rc}">${c.power}</span></div>
    <div class="stats-grid">${statsHTML}</div>
    <div class="ability-trait">
      <span class="ability-icon">${c.ability.icon}</span>
      <div class="ability-info"><div class="ability-name" style="color:${c.ability.color}">${c.ability.name}</div><div class="ability-desc">${c.ability.desc}</div></div>
    </div>
    </div>
    <div class="card-footer"><span>#${String(idx).padStart(3,'0')} / ${total}</span><span class="card-footer-brand">GitPacks</span></div></div>
    <div class="card-total-badge">${total} in set</div></div>`;
}
</script>
</body>
</html>
